<script>
const V=[{"version": "v0.5.0", "filename": "narrative-v0.5.0.md", "content": "# 개인의 시대\n\n## 디지털 기술이 개인과 공동체를 어떻게 바꾸고, 왜 새로운 질서와 거버넌스를 요구하는가\n\n태재미래전략연구원 디지털팀 · narrative v0.5.0 · 2026\n\n---\n\n### 1. 서론\n\n지금 필요한 것은 AI의 성능을 더 정확히 설명하는 일이 아니다. 더 중요한 것은, 이 기술이 인간을 어떻게 바꾸고 공동체를 어떻게 재편하는지를 먼저 읽는 일이다. 회장님이 먼저 보라고 한 것도 개인과 공동체의 변화다. 경제질서와 정치질서는 그 이후에 따라오는 결과다.\n\n우리는 오랫동안 기술을 생산성의 문제로 다뤄왔다. 더 빠르게 만들고, 더 많이 생산하고, 더 효율적으로 분배하는 문제로 보았다. 그러나 디지털 기술, 특히 AI는 그 수준에 머물지 않는다. 이 기술은 판단, 조정, 해석, 기획처럼 인간 사회의 위계와 역할 분담을 떠받쳐온 영역까지 흔들고 있다. 그러면 바뀌는 것은 산업만이 아니다. 개인이 자신을 설명하는 방식이 바뀌고, 공동체가 권한을 정당화하는 방식이 바뀌고, 그 결과 질서의 구조 전체가 흔들린다.\n\n이 글의 목적은 여기에 있다. 디지털 기술이 개인과 공동체를 어떻게 바꾸는지, 그 변화가 왜 긍정과 위협을 동시에 낳는지, 그리고 왜 결국 새로운 경제질서, 정치질서, 거버넌스를 요구하는지 하나의 흐름으로 설명하는 것이다.\n\n\n### 2. 역사 속 기술 전환과 디지털 기술의 특수성\n\n역사의 전환점마다 기술은 개인과 공동체를 바꿔왔다. 농업혁명은 정착과 잉여를 가능하게 하면서 가족과 지배 구조를 바꾸었다. 도시의 출현은 분업과 행정을 낳으면서 공동체의 규모와 위계 구조를 키웠다. 인쇄술은 지식의 독점을 무너뜨리며 개인의 판단 능력을 확장했고, 종교와 권위의 정당성을 흔들었다. 산업혁명은 육체 노동과 생산 수단의 조직 방식을 바꾸며 계급과 국가의 역할을 재편했다. 정보화는 정보 접근과 유통의 비대칭을 줄이며 개인과 조직의 관계를 바꾸었다.\n\n디지털 기술은 이 연장선에 있다. 그러나 동시에 이전 전환과는 질적으로 다르다. 과거의 기술이 주로 인간의 힘, 이동, 정보 접근을 확장했다면, AI는 판단과 해석의 영역까지 침투한다. 이것은 단순한 생산성 향상이 아니다. 기존 사회가 정당성을 부여해온 전문가, 관리자, 조직, 국가의 역할을 지탱하던 비대칭이 흔들린다는 뜻이다.\n\n또 하나의 차이는 속도다. 과거의 전환은 세대 단위로 누적되었지만, 디지털 전환은 훨씬 더 빠른 속도로 개인의 일상과 제도의 작동 원리 안으로 들어오고 있다. 적응할 시간을 길게 주지 않는다는 점에서, 이번 전환은 더 급진적이다.\n\n\n### 3. 디지털 시대 개인의 변화\n\n사람은 원래 같지 않다. 조건도 다르고, 능력도 다르고, 기술을 활용할 수 있는 여건도 다르다. 디지털 기술은 이 차이를 없애지 않는다. 오히려 다른 방식으로 벌리고 재조직한다. 누군가는 AI를 활용해 자신의 역량을 급격히 확장하고, 누군가는 보조적 활용에 머무르며, 누군가는 기존 역할을 잃고, 누군가는 아예 질서 밖으로 밀려날 수 있다. 따라서 디지털 전환은 하나의 개인상을 바꾸는 일이 아니라, 서로 다른 조건에 놓인 사람들을 서로 다르게 재편하는 과정으로 이해해야 한다.\n\n그럼에도 공통의 변화가 있다. 첫째, 일부 개인은 이전보다 훨씬 넓은 영역에서 스스로 판단하고 실행할 수 있게 된다. 과거에는 조직, 전문가, 제도에 의존해야 했던 일들이 점점 개인 단위에서도 가능해진다. 둘째, 기존 노동 질서 안에서 정체성을 설명하던 언어가 흔들린다. 안정된 직업, 역할 분담, 조직 내 승진 경로가 생계뿐 아니라 자기 설명의 틀이었는데, AI는 그 틀을 약화시킨다. 셋째, 이 변화는 갈망의 변화를 낳는다. 더 큰 자율을 원하고, 더 큰 의미를 원하고, 더 분명한 기여와 더 정당한 인정을 원하게 된다.\n\n다만 이 갈망 역시 균질하지 않다. 어떤 개인은 더 큰 자율을 원하지만, 어떤 개인은 더 강한 보호를 원할 수 있다. 어떤 개인은 의미 있는 기여의 기회를 찾고, 어떤 개인은 생존 안정성의 회복을 더 절실하게 원할 수 있다. 결국 디지털 시대 개인의 핵심 변화는 모두가 똑같이 강해진다는 데 있지 않다. 개인들이 서로 다른 속도와 방식으로 재편되면서, 기존 위계에 대한 순응과 저항의 패턴도 함께 달라진다는 데 있다.\n\n\n### 4. 디지털 시대 공동체의 변화\n\n태재에서 공동체는 단순한 소속 집단이 아니다. 공동체는 개인들로부터 제한된 권한을 위임받아 공공 질서를 유지하는 구조다. 따라서 디지털 시대의 공동체 변화는 단지 생활양식의 변화가 아니다. 공동체가 왜, 어디까지, 어떤 정당성으로 권한을 위임받을 수 있는가의 변화다.\n\n핵심은 이 점이다. 디지털 시대에는 공동체가 개인 삶 전반을 포괄적으로 대리하고 통제하는 구조로서 정당성을 유지하기 어려워진다. 개인이 더 많은 판단과 조정을 직접 수행할 수 있게 될수록, 공동체가 광범위하게 대신 결정하고 대신 조직하던 구조는 정당성을 잃는다. 그러나 그렇다고 공동체가 사라지는 것은 아니다. 오히려 돌봄, 보호, 신뢰, 협력 같은 기능은 더 중요해진다. 따라서 공동체는 약화되는 것이 아니라, 다른 근거 위에서 다시 설계되어야 한다.\n\n이 변화는 공동체 7층위에서 서로 다르게 나타난다.\n\n가정은 돌봄, 생활 유지, 정서적 안정, 기초 사회화의 기능을 맡아 왔다. 디지털 기술은 교육, 건강관리, 생활조정, 정보 접근의 일부를 가정 내부에서 더 많이 처리하게 만들 수 있다. 그만큼 외부 제도에 위임하던 일부 생활관리 기능은 줄어들 수 있다. 그러나 돌봄, 정서적 지지, 관계의 안정 같은 기능은 더 중요해진다.\n\n이웃은 일상적 신뢰, 상호부조, 생활 정보 공유의 단위였다. 디지털 기술은 물리적 근접성에만 의존하던 이웃 관계를 약화시킬 수 있지만, 동시에 지역 기반 연결과 생활 협력망을 다시 조직할 수도 있다. 위기 대응과 생활 협력의 기능은 남고, 자동으로 주어지는 관계가 아니라 다시 설계되는 생활 네트워크가 중요해진다.\n\n마을은 생활세계의 집합적 조정 단위였다. 중앙집중적 시스템이 흡수했던 기능 일부가 다시 지역 단위로 내려오면서, 마을은 복지, 교육, 생활 인프라를 세밀하게 실험하는 단위로 재등장할 수 있다.\n\n도시는 개인과 국가 사이에서 가장 유력한 재설계 단위로 부상할 가능성이 크다. 이동, 주거, 데이터, 공공서비스, 에너지, 플랫폼 인프라를 어떻게 설계하느냐에 따라 디지털 시대의 삶의 질이 크게 달라질 수 있기 때문이다.\n\n국가는 더 이상 삶의 모든 영역을 직접 관리하는 구조로서 정당성을 유지하기 어려워진다. 개인과 하위 공동체의 자율 역량이 커질수록, 국가는 모든 것을 통제하는 주체라기보다 국방, 재난, 기본 법질서, 대규모 공공 인프라 같은 필수 기능을 맡는 최종 보호자에 가까운 방향으로 재정의될 가능성이 크다.\n\n글로벌 공동체는 느슨한 협력의 차원을 넘어서 실질적인 규칙과 조정 메커니즘을 필요로 하게 된다. 기술패권, 데이터, 플랫폼 독점, 공급망, 안보 위험은 국가 내부에서만 처리할 수 없는 문제이기 때문이다.\n\n생태계는 더 이상 배경 조건이 아니다. 에너지, 자원, 기후, 환경 부담이 기술 전환과 직접 연결되면서, 생태계는 인간 공동체 질서의 지속 가능성을 규정하는 최종 층위가 된다.\n\n이 7개 층위를 관통하는 변화는 같다. 개인의 역량과 조건이 달라질수록 공동체에 대한 무제한적 위임은 줄어들고, 공동체는 더 제한된 권한과 더 분명한 목적 위에서 다시 설계되어야 한다.\n\n\n### 5. 디지털 기술이 초래할 긍정적 변화\n\n디지털 기술은 개인과 공동체에 새로운 가능성을 연다. 개인 차원에서는 더 많은 판단과 학습, 생산과 협력이 가능해진다. 일부 개인은 조직과 전문가에 대한 과도한 의존에서 벗어나 더 큰 자율을 누릴 수 있다. 공동체 차원에서는 생활 문제를 더 빠르게 조정하고, 더 작은 단위에서 실험하고, 더 넓은 범위에서 연결하는 능력이 강화될 수 있다.\n\n경제질서 차원에서는 반복 가능한 지적 노동의 비중이 줄어들고, 돌봄, 해석, 조정, 신뢰 형성, 공동체 유지 같은 영역의 가치가 다시 드러날 가능성이 있다. 정치질서 차원에서는 개인의 직접적 참여 요구, 제도의 투명성 요구, 위임 구조에 대한 재검토가 강해질 수 있다.\n\n즉 디지털 기술은 단지 효율을 높이는 기술이 아니라, 개인과 공동체를 더 자율적이고 더 유연하게 재조직할 가능성을 연다.\n\n\n### 6. 디지털 기술이 초래할 위협\n\n그러나 같은 변화는 더 큰 위협도 낳는다. 개인 차원에서는 격차가 확대된다. 어떤 개인은 강화되고 어떤 개인은 배제되며, 어떤 개인은 자율을 얻고 어떤 개인은 불안정성만 떠안게 된다. 공동체 차원에서는 신뢰와 위임 구조가 빠르게 흔들리는데, 이를 대체할 새로운 질서가 준비되지 않으면 해체와 혼란이 커질 수 있다.\n\n여기에 더해, 그동안 우리가 논의해 온 위협들은 이 변화 위에서 더 심각하게 작동할 수 있다. 인류를 공멸에 이르게 할 수 있는 위험이 1순위다. AI가 전쟁, 대량 살상, 시스템 붕괴와 결합할 경우 그 피해는 되돌리기 어렵다. 그 다음으로는 공동체 해체, 대량 실업, 극단주의, 대규모 불평등, 플랫폼 독점, 정보 조작, 정치적 불안정 같은 위험이 뒤따른다.\n\n경제질서 차원에서는 인간 가치를 가격으로만 측정하던 체계가 더 빠르게 불안정해질 수 있다. 정치질서 차원에서는 제도에 대한 신뢰가 무너지고, 통제와 보호 사이의 균형이 깨질 수 있다. 따라서 디지털 전환은 긍정적 가능성과 함께, 새로운 규모의 위험을 동시에 열어놓는 전환이다.\n\n\n### 7. 왜 대안적 경제질서와 정치질서가 필요한가\n\n여기서 대안 질서의 질문이 나온다. 개인과 공동체의 변화가 기존 질서를 흔든다면, 우리는 어떤 경제질서와 정치질서를 다시 상상해야 하는가.\n\n특히 경제질서에서 중요한 것은 자본주의를 자연 질서로 보지 않는 것이다. 지금의 자본주의는 너무 오래 지속된 탓에 자연스러운 체제처럼 보이지만, 역사적으로 보면 그렇지 않다. 인류의 경제는 오랫동안 시장만으로 조직되지 않았다. 종족사회에서는 호혜가, 다양한 전통 사회에서는 재분배와 관습, 정치적 의무와 종교적 규율이 경제활동을 규율했다. 자기조정적 시장을 전제하는 자본주의는 오히려 역사적으로 예외적인 체제다.\n\n주류 경제학이 전제해온 경제적 인간, 경제적 합리주의, 시장심리 역시 인간의 보편적 속성이라기보다 자본주의가 만들어낸 특수한 행동양식일 가능성이 크다. 자본주의는 인간의 가치와 공동체의 정의를 가격 계산의 틀 안에 밀어넣었다. 누가 더 필요한가보다 누가 더 많이 냈는가가 분배의 기준이 되었고, 경제는 사회에 묻혀 있던 관계가 아니라 사회를 지배하는 원리처럼 행동하기 시작했다.\n\n그 결과 자본주의의 모순도 분명해졌다. 노동의 상품화는 사회적 관계를 해체하고, 자연의 생산요소화는 생태적 지속 가능성을 위협한다. 디지털 기술은 이 모순을 더 빠르게 밀어붙인다. 인간의 노동뿐 아니라 판단과 해석까지 자동화될수록, 인간 가치를 가격으로만 측정하던 체계는 더 불안정해질 수밖에 없다.\n\n따라서 필요한 것은 단순한 규제의 보완이 아니다. 경제를 다시 사회적 관계 안에 묻어 넣는 다른 원리, 정치적 위임 구조를 다시 설계하는 다른 틀에 대한 탐색이다. 학계 역시 오랫동안 시장 바깥의 경제체제, 제도적 분석, 사회에 내재된 경제에 대한 흐름을 축적해 왔다. 우리는 이 흐름을 정답으로 가져오기보다, 태재가 던지는 질문을 더 넓히는 참고축으로 활용할 필요가 있다.\n\n\n### 8. 새로운 거버넌스와 사회계약\n\n거버넌스는 출발점이 아니라 결과다. 기술이 개인을 바꾸고, 공동체를 바꾸고, 경제질서와 정치질서를 흔든 뒤에야, 우리는 어떤 제도와 사회계약이 필요한지 묻게 된다.\n\n핵심 질문은 분명하다. 개인은 어디까지 직접 판단하고 책임질 수 있는가. 공동체와 국가는 어디까지 대신 결정하고 개입할 수 있는가. 무엇을 개인의 자율 영역으로 남기고, 무엇을 공동의 보호 영역으로 둘 것인가. 즉, 위임의 범위를 다시 정해야 한다.\n\n이 사회계약은 세 가지 축을 포함해야 한다. 첫째, 개인의 자율을 불필요하게 제약하지 않는 제도 설계다. 둘째, 공동체 해체와 극단적 불평등을 막는 보호 장치다. 셋째, 글로벌 차원의 거버넌스다. AI 전환은 한 국가 내부에서만 끝나지 않는다. 기술패권, 플랫폼 독점, 안보 위험, 국제 규범 경쟁은 모두 사회와 사회 사이의 문제다.\n\n결국 새로운 거버넌스는 기술 규제만을 뜻하지 않는다. 그것은 새로운 위임 구조, 새로운 보호 장치, 새로운 공공 인프라, 새로운 국제 규범을 함께 설계하는 일이다.\n\n\n### 9. 결론\n\n디지털 기술은 산업만 바꾸는 것이 아니다. 개인을 바꾸고, 공동체를 바꾸고, 그 결과 경제질서와 정치질서를 바꾼다. 그렇기 때문에 이 전환을 선제적으로 읽지 못하면, 우리는 언제나 사후 대응에 머물 수밖에 없다.\n\n지금 필요한 것은 기술 낙관도 기술 공포도 아니다. 개인과 공동체의 변화에서 출발해, 그 변화가 어떤 질서 재편을 압박하는지 먼저 읽고, 그에 맞는 사회계약과 거버넌스를 앞당겨 설계하는 일이다.\n\n그것이 디지털 시대를 준비하는 출발점이다.\n\n---\n\nnarrative v0.5.0 · 태재미래전략연구원 디지털팀 · 2026-04-15\n"}, {"version": "v0.4.6", "filename": "narrative-v0.4.6.md", "content": "# 개인의 시대\n\n## AI 전환이 개인의 변화, 공동체 7층위의 재편, 질서 전환으로 이어지는 과정\n\n태재미래전략연구원 디지털팀 · narrative v0.4.6 · 2026\n\n---\n\n### 프롤로그\n\nAI를 둘러싼 지금의 논의는 대체로 두 갈래로 갈린다. 하나는 기술의 성능과 위험을 말하는 논의이고, 다른 하나는 곧바로 규제와 거버넌스로 넘어가는 논의다. 그러나 이 두 논의 사이에는 비어 있는 층위가 있다. 기술이 먼저 무엇을 바꾸는지, 그 변화가 인간에게 어떤 갈망을 낳는지, 그 갈망이 공동체를 어떻게 재편하는지, 그리고 그 결과 경제와 정치의 질서가 어떻게 바뀌는지에 대한 설명이 빠져 있다.\n\n우리가 먼저 봐야 할 것은 기술 그 자체가 아니다. 기술이 바꾸는 개인이다. 그리고 그 변화한 개인이 무엇을 원하게 되는지, 어떤 공동체를 다시 만들게 되는지다. 회장님이 먼저 보라고 한 것도 개인과 공동체의 변화다. 경제질서와 정치질서의 변화는 그 다음에 오는 결과다.\n\n따라서 AI 전환은 다음과 같은 순서로 이해하는 것이 자연스럽다.\n\n디지털 기술의 등장 → 개인의 변화 → 공동체 7층위의 재편 → 경제질서와 정치질서의 변화 → 새로운 거버넌스와 사회계약\n\n이 순서를 따라가야 지금 우리가 어디에 서 있는지, 무엇을 먼저 설계해야 하는지가 보인다.\n\n\n### 1장. 디지털 기술의 등장\n\n디지털 기술, 특히 AI와 자동화, 플랫폼 기술은 이전의 산업 기술과 다른 방식으로 사회에 침투하고 있다. 이전 기술이 인간의 육체 노동이나 정보 접근을 확장했다면, AI는 판단, 분석, 기획, 조정 같은 영역까지 빠르게 잠식하고 있다. 지금 확장되고 있는 것은 단순 생산성이 아니라 개인이 스스로 처리할 수 있는 역량의 범위다.\n\n이 변화는 두 방향에서 동시에 일어난다. 한편으로 AI는 개인을 더 유능하게 만든다. 더 적은 시간과 비용으로 더 많은 정보에 접근하고, 더 정교한 판단을 하고, 더 빠르게 결과물을 만들 수 있게 한다. 다른 한편으로 AI는 기존 노동 구조를 불안정하게 만든다. 인간이 해오던 많은 역할이 대체되거나 재조합되면서, 노동을 중심으로 유지되던 정체성이 흔들리기 시작한다.\n\n즉, AI는 단순히 더 능력 있는 개인을 만드는 것이 아니다. 더 능력 있는 개인과 동시에 정체성의 공백을 경험하는 개인을 만들어낸다. 이 이중 변화가 이후의 모든 단계의 출발점이다.\n\n\n### 2장. 개인의 변화\n\n기술 변화의 첫 번째 효과는 개인의 변화다. AI를 활용하는 개인은 과거보다 훨씬 넓은 영역에서 스스로 판단하고 실행할 수 있게 된다. 과거에는 조직, 전문가, 제도에 의존해야 했던 일이 점점 개인 단위에서도 가능해진다. 분석, 기획, 문서 작성, 학습, 조언, 조정, 심지어 일부 의사결정까지 개인이 직접 감당할 수 있게 된다.\n\n그러나 여기서 끝나지 않는다. 개인의 역량이 커질수록 기존 노동 질서 안에서 자신의 위치를 설명하던 언어가 흔들린다. 산업화 사회에서 개인은 대체로 직업을 통해 자신을 정의했다. 안정된 직업, 승진 경로, 조직 내 역할 분담은 개인의 생계뿐 아니라 자기 설명의 틀이었다.\n\nAI는 이 틀을 약화시킨다. 이전보다 더 많은 일을 혼자 해낼 수 있는데, 동시에 내가 하던 일이 시장에서 덜 희소해진다. 역량은 커지는데 역할의 안정성은 줄어든다. 바로 여기서 개인은 정체성의 공백을 경험한다. 나는 단지 직업을 수행하는 노동자인가, 아니면 더 넓게 판단하고 기여할 수 있는 존재인가. 이 질문은 AI 전환이 만들어내는 구조적 질문이다.\n\n그리고 이 변화는 곧 갈망의 변화로 이어진다. 더 유능해진 개인은 더 큰 자율을 원하고, 더 큰 의미를 원하고, 더 분명한 기여를 원하고, 더 정당한 인정을 원하게 된다. 위계 대신 자율을, 소비 대신 기여를, 직업적 명함 대신 의미 있는 역할을 추구하게 되는 것이다.\n\n개인의 변화에서 가장 중요한 점은 이것이다. 더 유능해진 개인은 단지 더 많은 일을 할 수 있는 개인이 아니라, 더 이상 예전처럼 통제에 쉽게 순응하지 않는 개인이 된다는 점이다. AI 전환은 인간을 더 이기적으로 만드는 것이 아니라, 오히려 왜 내가 이 구조에 계속 복종해야 하는가를 더 날카롭게 묻는 존재로 만든다.\n\n이 변화는 기존 제도와 충돌한다. 산업화 시대의 제도는 안정적인 대량 노동과 위계적 조정을 전제로 설계되었지만, AI로 강화된 개인은 그 구조 안에서 점점 답답함을 느낀다. 결국 개인의 변화는 공동체 재편의 압력으로 이어진다.\n\n\n### 3장. 공동체 7층위의 재편\n\n태재에서 공동체는 단순한 소속 집단이 아니다. 공동체는 개인들로부터 제한된 권한을 위임받아 공공 질서를 유지하는 구조다. 디지털 시대의 공동체 변화를 말하려면, 각 층위마다 네 가지 질문을 던져야 한다. 원래 어떤 기능을 했는가, 디지털 시대에 무엇이 달라지는가, 개인이 위임하던 권한 중 무엇이 줄고 무엇이 남는가, 새로 중요해지는 역할은 무엇인가.\n\n공동체 변화의 핵심은 공동체가 사라진다는 데 있지 않다. 공동체가 개인에게서 받아온 무제한적 위임의 정당성을 잃는다는 데 있다.\n\n#### 1. 가정\n가정은 원래 돌봄, 생활 유지, 정서적 안정, 기초 사회화의 기능을 담당해 왔다. 디지털 시대에는 교육, 건강관리, 생활조정, 정보 접근의 상당 부분을 가정 내부에서 더 많이 처리할 수 있게 된다. 그 결과 외부 제도에 위임하던 일부 생활관리 기능은 줄어들 수 있다. 반면 돌봄, 정서적 지지, 관계의 안정 같은 기능은 여전히 남고 오히려 더 중요해진다. 새로 중요해지는 역할은 기술이 대체할 수 없는 가장 가까운 삶의 기반으로서의 기능이다.\n\n#### 2. 이웃\n이웃은 원래 일상적 신뢰, 상호부조, 생활 정보 공유의 기능을 해왔다. 디지털 시대에는 물리적 근접성만으로는 이웃 관계가 유지되기 어려워질 수 있지만, 동시에 지역 기반 연결과 생활 협력망을 더 빠르게 조직할 수도 있다. 개인이 이웃에 위임하던 비공식적 감시와 돌봄 기능은 일부 줄어들 수 있으나, 위기 대응과 생활 협력 기능은 남는다. 새로 중요해지는 역할은 자동으로 주어지는 관계가 아니라, 다시 설계되는 생활 협력 네트워크다.\n\n#### 3. 마을\n마을은 원래 생활세계의 집합적 조정 단위였고, 교육, 복지, 생활 인프라를 가까운 수준에서 엮는 역할을 해왔다. 디지털 시대에는 중앙집중적 시스템이 흡수했던 기능 일부가 다시 지역 단위로 내려올 수 있다. 개인이 마을에 위임하던 전통적 생활조정 기능은 축소될 수 있지만, 지역 실험, 촘촘한 복지, 생활 단위 문제 해결 기능은 남고 강화될 수 있다. 새로 중요해지는 역할은 실제 삶의 문제를 풀어내는 가장 유연한 실험 단위라는 점이다.\n\n#### 4. 도시\n도시는 원래 생산, 교환, 인프라, 공공서비스, 행정의 중심 단위였다. 디지털 시대에는 이동, 주거, 데이터, 공공서비스, 에너지, 플랫폼 인프라를 어떻게 설계하느냐에 따라 삶의 질이 크게 달라진다. 개인이 국가에 위임했던 일부 서비스 조정 기능은 도시 수준으로 내려올 수 있다. 반면 대규모 인프라와 공공서비스 조정 기능은 여전히 남는다. 새로 중요해지는 역할은 개인과 국가 사이를 잇는 가장 현실적인 재설계 단위라는 점이다.\n\n#### 5. 국가\n국가는 원래 안보, 법질서, 교육, 의료, 금융, 이동, 정보 흐름 등 삶의 광범위한 영역을 조정하고 통제해 왔다. 그러나 디지털 시대에는 개인과 하위 공동체의 자율 역량이 커지면서, 국가가 모든 것을 직접 관리해야 할 이유는 약해진다. 개인이 국가에 위임하던 일부 생활 관리와 판단 기능은 줄어들 수 있다. 반면 국방, 재난 대응, 기본 법질서, 대규모 공공 인프라 같은 기능은 여전히 남는다. 새로 중요해지는 역할은 과잉 통제자가 아니라 최종 보호자이자 대규모 조정자로 재정의되는 것이다.\n\n#### 6. 글로벌\n글로벌 공동체는 원래 국가 간 협력과 규범 조정의 느슨한 차원에 머물렀다. 그러나 디지털 시대에는 기술패권, 데이터, 플랫폼 독점, 공급망, 안보 위험이 국가 경계를 넘어서기 때문에 글로벌 차원의 조정이 훨씬 중요해진다. 각 국가가 독자적으로 처리하던 문제 중 일부는 더 이상 국가 단위에서 해결되지 않는다. 반면 규칙 형성, 협력, 집행 메커니즘 문제는 그대로 남는다. 새로 중요해지는 역할은 선언적 국제협력이 아니라 실제 작동하는 글로벌 조정 구조다.\n\n#### 7. 생태계\n생태계는 원래 인간 공동체의 배경 조건처럼 취급되었지만, 사실상 모든 공동체를 지탱하는 최종 기반이었다. 디지털 시대에는 에너지, 자원, 기후, 환경 부담이 기술 전환과 직접 연결되면서 생태계는 더 이상 배경이 아니다. 인간 공동체가 자연에 위임해온 무한한 수용 능력이라는 가정은 약화된다. 반면 지속 가능성을 보장하는 조건으로서의 기능은 절대적으로 남는다. 새로 중요해지는 역할은 인간 중심 질서의 한계를 규정하는 최종 조건이라는 점이다.\n\n이 7개 층위를 관통하는 변화는 같다. 개인의 역량이 커질수록 공동체에 대한 무제한적 위임은 줄어들고, 공동체는 더 제한된 권한과 더 분명한 목적 위에서 다시 설계되어야 한다. 공동체는 사라지지 않는다. 오히려 더 중요해진다. 다만 그것은 산업화 시대처럼 강제된 소속의 구조가 아니라, 선택된 연결과 필요한 위임의 구조로 재편된다.\n\n\n### 4장. 질서의 변화\n\n공동체의 재편은 곧 질서의 변화를 뜻한다. 질서는 단지 개인과 사회의 관계만이 아니라, 사회와 사회 사이의 관계까지 포함한 패턴의 총체다. 따라서 디지털 시대의 변화는 생활방식 변화에 그치지 않고, 경제질서와 정치질서의 재편으로 이어진다.\n\n#### 1. 경제질서, 자본주의는 자연 질서가 아니라 역사적 질서다\n\n지금의 자본주의는 너무 오래 지속된 탓에 자연 질서처럼 보인다. 그러나 역사적으로 보면 그렇지 않다. 인류의 경제는 오랫동안 시장만으로 조직되지 않았다. 종족사회에서는 호혜가, 고대 제국과 전통 사회에서는 재분배가, 다양한 지역 공동체에서는 관습과 위계, 종교와 정치적 의무가 경제활동을 규율했다. 오늘날 자본주의가 전제하는 자기조정적 시장은 오히려 예외적인 체제다.\n\n이 점이 중요한 이유는 분명하다. 자본주의가 자연 질서가 아니라면, 그것은 바뀔 수 있는 질서이기 때문이다. 디지털 전환은 바로 그 재구성 가능성을 다시 현실의 문제로 끌어올린다.\n\n주류 경제학은 오랫동안 인간을 이익을 추구하고 교환을 선호하는 경제적 인간으로 전제해 왔다. 그러나 이런 인간상은 인간의 본성이 아니라 자본주의가 만들어낸 행동 양식일 가능성이 크다. 인간은 원래부터 가격 계산만 하는 존재가 아니었다. 명예, 의무, 신앙, 공동체적 위신, 상호부조, 정치적 충성, 사회적 책임이 경제행동을 조직해 왔다. 자본주의는 이런 복합적인 인간을 하나의 계산 가능한 행위자로 단순화했다.\n\n이 과정에서 경제적 합리주의는 단순한 분석도구를 넘어 지배적 사고방식이 되었다. 무엇이 더 필요한가가 아니라 무엇이 더 효율적인가가 질문의 중심이 되었고, 공동체 기준의 정의는 가격 기준의 정의로 대체되었다. 누가 더 필요한가보다 누가 더 많이 냈는가가 분배의 기준이 되었다. 이것이 시장심리의 확장이다.\n\n자본주의의 문제는 단지 불평등이 아니다. 인간의 가치와 자연의 조건, 공동체의 안정성을 모두 가격 체계 안에 밀어넣는 데 있다. 노동의 상품화는 사회적 관계를 해체하고, 자연의 생산요소화는 생태적 파괴를 가속한다. 이것은 자본주의의 외부효과가 아니라, 그 체제의 내적 성향이다.\n\n디지털 기술은 이 모순을 더 밀어붙인다. 자본주의가 인간을 노동력으로 가격화해 왔다면, AI는 그 노동력의 희소성 자체를 빠르게 무너뜨린다. 인간의 판단과 분석, 기획 능력까지 자동화될수록, 인간 가치를 시장가격으로만 측정하던 질서는 더 불안정해진다. 그래서 문제는 단순히 일자리가 줄어든다는 것이 아니다. 자본주의가 인간을 평가하던 기본 원리 자체가 흔들린다는 데 있다.\n\n이 지점에서 대안적 경제질서의 질문이 나온다. 디지털 시대의 경제는 계속 자본주의의 연장선에서만 조직될 수 있는가. 아니면 경제를 다시 사회적 관계 속에 묻어 넣는 다른 원리가 필요해지는가. 태재의 문제의식은 바로 여기에 있다. 디지털 기술은 자본주의 이후를 자동으로 보장하지 않는다. 그러나 자본주의의 지속불가능성을 더 빠르게 노출시키고, 대안적 질서를 다시 사유하도록 강제한다.\n\n#### 2. 정치질서, 위임 구조의 재편\n\n정치질서는 권한 위임과 정당성의 구조가 어떻게 바뀌는가의 문제다. 개인이 더 많은 판단과 실행을 직접 할 수 있게 되고, 공동체의 각 층위가 다시 설계되면, 국가와 제도의 정당성 기준도 달라진다. 왜 이만큼의 권한을 위임해야 하는가, 왜 이 수준의 통제가 필요한가라는 질문이 더 강하게 제기된다.\n\n산업화 시대 정치질서는 개인의 무능과 의존성을 전제로 설계되었다. 그러나 디지털 시대에는 그 전제가 약해진다. 정치질서의 핵심 문제는 이제 누가 더 많이 통치하느냐가 아니라, 어디까지 위임이 정당한가로 이동한다.\n\n#### 3. 글로벌 질서, 사회와 사회 사이의 관계\n\n이 질서 변화는 국내 차원에 머물지 않는다. 사회와 사회 사이의 관계, 즉 국제질서 역시 흔들린다. 기술 격차, 규범 경쟁, 플랫폼 지배, 안보 위험은 모두 사회-사회 관계의 문제이기 때문이다.\n\n글로벌 차원의 핵심 문제는 단순한 협력 부족이 아니다. 누가 규칙을 만들고, 누가 집행하며, 누가 정당성을 부여할 것인가라는 행위자 부재다. 따라서 글로벌 질서 문제는 국내 제도의 단순 확장이 아니라, 사회-사회 관계를 조직하는 새로운 거버넌스 구조의 문제로 다뤄져야 한다.\n\n\n### 5장. 새로운 거버넌스와 사회계약\n\n거버넌스는 출발점이 아니라 결과다. 기술이 개인을 바꾸고, 개인의 갈망이 공동체를 바꾸고, 공동체의 변화가 경제질서와 정치질서를 재편한 뒤에야, 우리는 어떤 제도와 사회계약이 필요한지 묻게 된다.\n\n새로운 사회계약의 핵심 질문은 분명하다. 개인은 어디까지 직접 판단하고 책임질 수 있는가. 공동체와 국가는 어디까지 대신 결정하고 개입할 수 있는가. 무엇을 개인의 자율 영역으로 남기고, 무엇을 공동의 보호 영역으로 둘 것인가. 즉, 위임의 범위를 다시 정해야 한다.\n\n이 사회계약은 세 가지 축을 포함해야 한다. 첫째, 개인의 자율을 불필요하게 제약하지 않는 제도 설계다. 둘째, 공동체 해체와 극단적 불평등을 막는 보호 장치다. 셋째, 글로벌 차원의 거버넌스다. AI 전환은 한 국가 내부에서만 끝나지 않는다. 기술패권, 플랫폼 독점, 안보 위험, 국제 규범 경쟁은 모두 사회와 사회 사이의 문제다.\n\n결국 새로운 거버넌스는 기술 규제만을 뜻하지 않는다. 그것은 새로운 위임 구조, 새로운 보호 장치, 새로운 공공 인프라, 새로운 국제 규범을 함께 설계하는 일이다.\n\n\n### 6장. 왜 지금 다시 설계해야 하는가\n\nAI 전환의 속도는 이전과 다르다. 개인은 이미 바뀌고 있고, 공동체는 이미 재편 압력을 받고 있다. 그러나 경제질서와 정치질서, 제도와 거버넌스는 아직 그 속도를 따라가지 못하고 있다. 이 간극이 커질수록 갈등은 심해질 수밖에 없다.\n\n지금 필요한 것은 솔루션의 나열이 아니다. 개인의 변화와 갈망이 어떤 공동체 재편을 낳고, 그 공동체 재편이 어떤 질서 전환을 압박하는지, 그 결과 어떤 사회계약과 거버넌스가 필요한지를 하나의 서사로 설득력 있게 제시하는 일이다.\n\n설계가 늦을수록 비용은 커진다. 공동체가 먼저 흔들리고, 그 다음에 질서가 무너진 뒤에 제도를 고치려 들면 언제나 더 큰 충돌을 치르게 된다. 지금 필요한 것은 기술 낙관도, 기술 공포도 아니다. 개인과 공동체의 변화에서 출발해 질서의 재편을 먼저 읽고, 그에 맞는 사회계약을 앞당겨 설계하는 일이다.\n\n---\n\nnarrative v0.4.6 · 태재미래전략연구원 디지털팀 · 2026-04-15\n"}, {"version": "v0.4.5", "filename": "narrative-v0.4.5.md", "content": "# 개인의 시대\n\n## AI 전환이 개인의 변화, 공동체 7층위의 재편, 질서 전환으로 이어지는 과정\n\n태재미래전략연구원 디지털팀 · narrative v0.4.5 · 2026\n\n---\n\n### 프롤로그\n\nAI를 둘러싼 지금의 논의는 대체로 두 갈래로 갈린다. 하나는 기술의 성능과 위험을 말하는 논의이고, 다른 하나는 곧바로 규제와 거버넌스로 넘어가는 논의다. 그러나 이 두 논의 사이에는 비어 있는 층위가 있다. 기술이 먼저 무엇을 바꾸는지, 그 변화가 인간에게 어떤 갈망을 낳는지, 그 갈망이 공동체를 어떻게 재편하는지, 그리고 그 결과 경제와 정치의 질서가 어떻게 바뀌는지에 대한 설명이 빠져 있다.\n\n우리가 먼저 봐야 할 것은 기술 그 자체가 아니다. 기술이 바꾸는 개인이다. 그리고 그 변화한 개인이 무엇을 원하게 되는지, 어떤 공동체를 다시 만들게 되는지다. 회장님이 먼저 보라고 한 것도 개인과 공동체의 변화다. 경제질서와 정치질서의 변화는 그 다음에 오는 결과다.\n\n따라서 AI 전환은 다음과 같은 순서로 이해하는 것이 자연스럽다.\n\n디지털 기술의 등장 → 개인의 변화 → 개인의 갈망 → 공동체 7층위의 재편 → 경제질서와 정치질서의 변화 → 새로운 거버넌스와 사회계약\n\n\n### 1장. 디지털 기술의 등장\n\n디지털 기술, 특히 AI와 자동화, 플랫폼 기술은 이전의 산업 기술과 다른 방식으로 사회에 침투하고 있다. 이전 기술이 인간의 육체 노동이나 정보 접근을 확장했다면, AI는 판단, 분석, 기획, 조정 같은 영역까지 빠르게 잠식하고 있다. 지금 확장되고 있는 것은 단순 생산성이 아니라 개인이 스스로 처리할 수 있는 역량의 범위다.\n\n이 변화는 두 방향에서 동시에 일어난다. 한편으로 AI는 개인을 더 유능하게 만든다. 더 적은 시간과 비용으로 더 많은 정보에 접근하고, 더 정교한 판단을 하고, 더 빠르게 결과물을 만들 수 있게 한다. 다른 한편으로 AI는 기존 노동 구조를 불안정하게 만든다. 인간이 해오던 많은 역할이 대체되거나 재조합되면서, 노동을 중심으로 유지되던 정체성이 흔들리기 시작한다.\n\n즉, AI는 단순히 더 능력 있는 개인을 만드는 것이 아니다. 더 능력 있는 개인과 동시에 정체성의 공백을 경험하는 개인을 만들어낸다. 이 이중 변화가 이후의 모든 단계의 출발점이다.\n\n\n### 2장. 개인의 변화\n\n기술 변화의 첫 번째 효과는 개인의 변화다. AI를 활용하는 개인은 과거보다 훨씬 넓은 영역에서 스스로 판단하고 실행할 수 있게 된다. 과거에는 조직, 전문가, 제도에 의존해야 했던 일이 점점 개인 단위에서도 가능해진다. 분석, 기획, 문서 작성, 학습, 조언, 조정, 심지어 일부 의사결정까지 개인이 직접 감당할 수 있게 된다.\n\n그러나 여기서 끝나지 않는다. 개인의 역량이 커질수록 기존 노동 질서 안에서 자신의 위치를 설명하던 언어가 흔들린다. 산업화 사회에서 개인은 대체로 직업을 통해 자신을 정의했다. 안정된 직업, 승진 경로, 조직 내 역할 분담은 개인의 생계뿐 아니라 자기 설명의 틀이었다.\n\nAI는 이 틀을 약화시킨다. 이전보다 더 많은 일을 혼자 해낼 수 있는데, 동시에 내가 하던 일이 시장에서 덜 희소해진다. 역량은 커지는데 역할의 안정성은 줄어든다. 바로 여기서 개인은 정체성의 공백을 경험한다. 나는 단지 직업을 수행하는 노동자인가, 아니면 더 넓게 판단하고 기여할 수 있는 존재인가. 이 질문은 AI 전환이 만들어내는 구조적 질문이다.\n\n\n### 3장. 개인의 갈망\n\n개인의 변화 다음에는 개인의 갈망이 온다. 실제로 사회를 움직이는 것은 능력 그 자체가 아니라, 능력이 낳는 갈망이다.\n\n역량이 확장된 개인은 이전과 다른 것을 원하게 된다. 더 큰 자율을 원하고, 더 큰 의미를 원하고, 더 분명한 기여를 원하고, 더 정당한 인정을 원한다. 그 결과 사람들은 위계 대신 자율을, 소비 대신 기여를, 직업적 명함 대신 의미 있는 역할을 추구하게 된다.\n\n이 갈망은 기존 제도와 충돌한다. 산업화 시대의 제도는 안정적인 대량 노동과 위계적 조정을 전제로 설계되었지만, AI로 강화된 개인은 그 구조 안에서 점점 답답함을 느낀다. 결국 개인의 갈망은 공동체 재편의 압력으로 이어진다.\n\n\n### 4장. 공동체 7층위의 재편\n\n태재에서 공동체는 단순한 소속 집단이 아니다. 공동체는 개인들로부터 제한된 권한을 위임받아 공공 질서를 유지하는 구조다. 디지털 시대의 공동체 변화를 말하려면, 각 층위마다 네 가지 질문을 던져야 한다. 원래 어떤 기능을 했는가, 디지털 시대에 무엇이 달라지는가, 개인이 위임하던 권한 중 무엇이 줄고 무엇이 남는가, 새로 중요해지는 역할은 무엇인가.\n\n#### 1. 가정\n\n가정은 원래 돌봄, 생활 유지, 정서적 안정, 기초 사회화의 기능을 담당해 왔다. 디지털 시대에는 교육, 건강관리, 생활조정, 정보 접근의 상당 부분을 가정 내부에서 더 많이 처리할 수 있게 된다. 그 결과 외부 제도에 위임하던 일부 생활관리 기능은 줄어들 수 있다. 반면 돌봄, 정서적 지지, 관계의 안정 같은 기능은 여전히 남고 오히려 더 중요해진다. 새로 중요해지는 역할은 기술이 대체할 수 없는 가장 가까운 삶의 기반으로서의 기능이다.\n\n#### 2. 이웃\n\n이웃은 원래 일상적 신뢰, 상호부조, 생활 정보 공유의 기능을 해왔다. 디지털 시대에는 물리적 근접성만으로는 이웃 관계가 유지되기 어려워질 수 있지만, 동시에 지역 기반 연결과 생활 협력망을 더 빠르게 조직할 수도 있다. 개인이 이웃에 위임하던 비공식적 감시와 돌봄 기능은 일부 줄어들 수 있으나, 위기 대응과 생활 협력 기능은 남는다. 새로 중요해지는 역할은 자동으로 주어지는 관계가 아니라, 다시 설계되는 생활 협력 네트워크다.\n\n#### 3. 마을\n\n마을은 원래 생활세계의 집합적 조정 단위였고, 교육, 복지, 생활 인프라를 가까운 수준에서 엮는 역할을 해왔다. 디지털 시대에는 중앙집중적 시스템이 흡수했던 기능 일부가 다시 지역 단위로 내려올 수 있다. 개인이 마을에 위임하던 전통적 생활조정 기능은 축소될 수 있지만, 지역 실험, 촘촘한 복지, 생활 단위 문제 해결 기능은 남고 강화될 수 있다. 새로 중요해지는 역할은 실제 삶의 문제를 풀어내는 가장 유연한 실험 단위라는 점이다.\n\n#### 4. 도시\n\n도시는 원래 생산, 교환, 인프라, 공공서비스, 행정의 중심 단위였다. 디지털 시대에는 이동, 주거, 데이터, 공공서비스, 에너지, 플랫폼 인프라를 어떻게 설계하느냐에 따라 삶의 질이 크게 달라진다. 개인이 국가에 위임했던 일부 서비스 조정 기능은 도시 수준으로 내려올 수 있다. 반면 대규모 인프라와 공공서비스 조정 기능은 여전히 남는다. 새로 중요해지는 역할은 개인과 국가 사이를 잇는 가장 현실적인 재설계 단위라는 점이다.\n\n#### 5. 국가\n\n국가는 원래 안보, 법질서, 교육, 의료, 금융, 이동, 정보 흐름 등 삶의 광범위한 영역을 조정하고 통제해 왔다. 그러나 디지털 시대에는 개인과 하위 공동체의 자율 역량이 커지면서, 국가가 모든 것을 직접 관리해야 할 이유는 약해진다. 개인이 국가에 위임하던 일부 생활 관리와 판단 기능은 줄어들 수 있다. 반면 국방, 재난 대응, 기본 법질서, 대규모 공공 인프라 같은 기능은 여전히 남는다. 새로 중요해지는 역할은 과잉 통제자가 아니라 최종 보호자이자 대규모 조정자로 재정의되는 것이다.\n\n#### 6. 글로벌\n\n글로벌 공동체는 원래 국가 간 협력과 규범 조정의 느슨한 차원에 머물렀다. 그러나 디지털 시대에는 기술패권, 데이터, 플랫폼 독점, 공급망, 안보 위험이 국가 경계를 넘어서기 때문에 글로벌 차원의 조정이 훨씬 중요해진다. 각 국가가 독자적으로 처리하던 문제 중 일부는 더 이상 국가 단위에서 해결되지 않는다. 반면 규칙 형성, 협력, 집행 메커니즘 문제는 그대로 남는다. 새로 중요해지는 역할은 선언적 국제협력이 아니라 실제 작동하는 글로벌 조정 구조다.\n\n#### 7. 생태계\n\n생태계는 원래 인간 공동체의 배경 조건처럼 취급되었지만, 사실상 모든 공동체를 지탱하는 최종 기반이었다. 디지털 시대에는 에너지, 자원, 기후, 환경 부담이 기술 전환과 직접 연결되면서 생태계는 더 이상 배경이 아니다. 인간 공동체가 자연에 위임해온 무한한 수용 능력이라는 가정은 약화된다. 반면 지속 가능성을 보장하는 조건으로서의 기능은 절대적으로 남는다. 새로 중요해지는 역할은 인간 중심 질서의 한계를 규정하는 최종 조건이라는 점이다.\n\n이 7개 층위를 관통하는 변화는 같다. 개인의 역량이 커질수록 공동체에 대한 무제한적 위임은 줄어들고, 공동체는 더 제한된 권한과 더 분명한 목적 위에서 다시 설계되어야 한다. 공동체는 사라지지 않는다. 오히려 더 중요해진다. 다만 그것은 산업화 시대처럼 강제된 소속의 구조가 아니라, 선택된 연결과 필요한 위임의 구조로 재편된다.\n\n\n### 5장. 질서의 변화\n\n공동체의 재편은 곧 질서의 변화를 뜻한다. 질서는 단지 개인과 사회의 관계만이 아니라, 사회와 사회 사이의 관계까지 포함한 패턴의 총체다. 따라서 디지털 시대의 변화는 생활방식 변화에 그치지 않고, 경제질서와 정치질서의 재편으로 이어진다.\n\n먼저 경제질서는 개인과 공동체가 생산, 분배, 교환을 어떻게 조직하는가의 문제다. 개인의 역량이 확장되고 공동체의 위임 구조가 바뀌면, 노동 중심의 가치 평가와 분배 체계는 흔들린다. 반복 가능한 지적 노동의 희소성은 줄어들고, 실제 문제 해결, 신뢰 형성, 돌봄, 해석, 조정, 공동체 유지 같은 기여의 중요성은 커진다. 시장은 계속 존재하겠지만, 시장 가격만으로 인간의 가치를 설명하던 질서는 약해질 수밖에 없다.\n\n이 지점에서 폴라니는 역사적 근거가 된다. 시장경제 또는 자본주의 역시 인류 역사에서 자연스럽게 주어진 체제가 아니라, 특정한 시기에 형성된 제도적 질서였다는 점을 분명히 해준다. 그렇다면 AI 시대에 그 질서가 다시 재구성될 수 있다는 생각도 공상으로만 볼 수 없다. 우리는 역사를 통해 미래를 예상하고 대비하는 기관이기 때문에, 경제질서의 역사성을 분명히 보는 일이 중요하다.\n\n정치질서는 권한 위임과 정당성의 구조가 어떻게 바뀌는가의 문제다. 개인이 더 많은 판단과 실행을 직접 할 수 있게 되고, 공동체의 각 층위가 다시 설계되면, 국가와 제도의 정당성 기준도 달라진다. 왜 이만큼의 권한을 위임해야 하는가, 왜 이 수준의 통제가 필요한가라는 질문이 더 강하게 제기된다. 정치질서는 결국 위임의 범위를 다시 정하는 방향으로 재편될 가능성이 크다.\n\n그리고 이 질서 변화는 국내 차원에 머물지 않는다. 사회와 사회 사이의 관계, 즉 국제질서 역시 흔들린다. 기술 격차, 규범 경쟁, 플랫폼 지배, 안보 위험은 모두 사회-사회 관계의 문제이기 때문이다.\n\n\n### 6장. 새로운 거버넌스와 사회계약\n\n거버넌스는 출발점이 아니라 결과다. 기술이 개인을 바꾸고, 개인의 갈망이 공동체를 바꾸고, 공동체의 변화가 경제질서와 정치질서를 재편한 뒤에야, 우리는 어떤 제도와 사회계약이 필요한지 묻게 된다.\n\n새로운 사회계약의 핵심 질문은 분명하다. 개인은 어디까지 직접 판단하고 책임질 수 있는가. 공동체와 국가는 어디까지 대신 결정하고 개입할 수 있는가. 무엇을 개인의 자율 영역으로 남기고, 무엇을 공동의 보호 영역으로 둘 것인가. 즉, 위임의 범위를 다시 정해야 한다.\n\n이 사회계약은 세 가지 축을 포함해야 한다. 첫째, 개인의 자율을 불필요하게 제약하지 않는 제도 설계다. 둘째, 공동체 해체와 극단적 불평등을 막는 보호 장치다. 셋째, 글로벌 차원의 거버넌스다. AI 전환은 한 국가 내부에서만 끝나지 않는다. 기술패권, 플랫폼 독점, 안보 위험, 국제 규범 경쟁은 모두 사회와 사회 사이의 문제다.\n\n결국 새로운 거버넌스는 기술 규제만을 뜻하지 않는다. 그것은 새로운 위임 구조, 새로운 보호 장치, 새로운 공공 인프라, 새로운 국제 규범을 함께 설계하는 일이다.\n\n\n### 7장. 왜 지금 다시 설계해야 하는가\n\nAI 전환의 속도는 이전과 다르다. 개인은 이미 바뀌고 있고, 공동체는 이미 재편 압력을 받고 있다. 그러나 경제질서와 정치질서, 제도와 거버넌스는 아직 그 속도를 따라가지 못하고 있다. 이 간극이 커질수록 갈등은 심해질 수밖에 없다.\n\n지금 필요한 것은 솔루션의 나열이 아니다. 개인의 변화와 갈망이 어떤 공동체 재편을 낳고, 그 공동체 재편이 어떤 질서 전환을 압박하는지, 그 결과 어떤 사회계약과 거버넌스가 필요한지를 하나의 서사로 설득력 있게 제시하는 일이다.\n\n그것이 지금 다시 설계해야 하는 이유다.\n\n---\n\nnarrative v0.4.5 · 태재미래전략연구원 디지털팀 · 2026-04-15\n"}, {"version": "v0.4.4", "filename": "narrative-v0.4.4.md", "content": "# 개인의 시대\n\n## AI 전환이 개인의 변화, 공동체 7층위의 재편, 질서 전환으로 이어지는 과정\n\n태재미래전략연구원 디지털팀 · narrative v0.4.4 · 2026\n\n---\n\n### 프롤로그\n\nAI를 둘러싼 지금의 논의는 대체로 두 갈래로 갈린다. 하나는 기술의 성능과 위험을 말하는 논의이고, 다른 하나는 곧바로 규제와 거버넌스로 넘어가는 논의다. 그러나 이 두 논의 사이에는 비어 있는 층위가 있다. 기술이 먼저 무엇을 바꾸는지, 그 변화가 인간에게 어떤 갈망을 낳는지, 그 갈망이 공동체를 어떻게 재편하는지, 그리고 그 결과 경제와 정치의 질서가 어떻게 바뀌는지에 대한 설명이 빠져 있다.\n\n우리가 먼저 봐야 할 것은 기술 그 자체가 아니다. 기술이 바꾸는 개인이다. 그리고 그 변화한 개인이 무엇을 원하게 되는지, 어떤 공동체를 다시 만들게 되는지다. 회장님이 먼저 보라고 한 것도 개인과 공동체의 변화다. 경제질서와 정치질서의 변화는 그 다음에 오는 결과다.\n\n따라서 AI 전환은 다음과 같은 순서로 이해하는 것이 자연스럽다.\n\n디지털 기술의 등장 → 개인의 변화 → 개인의 갈망 → 공동체 7층위의 재편 → 경제질서와 정치질서의 변화 → 새로운 거버넌스와 사회계약\n\n이 순서를 따라가야 지금 우리가 어디에 서 있는지, 무엇을 먼저 설계해야 하는지가 보인다.\n\n\n### 1장. 디지털 기술의 등장, 무엇이 달라졌는가\n\n디지털 기술, 특히 AI와 자동화, 플랫폼 기술은 이전의 산업 기술과 다른 방식으로 사회에 침투하고 있다. 이전 기술이 인간의 육체 노동이나 정보 접근을 확장했다면, AI는 판단, 분석, 기획, 조정 같은 영역까지 빠르게 잠식하고 있다. 지금 확장되고 있는 것은 단순 생산성이 아니라 개인이 스스로 처리할 수 있는 역량의 범위다.\n\n이 변화는 두 방향에서 동시에 일어난다. 한편으로 AI는 개인을 더 유능하게 만든다. 더 적은 시간과 비용으로 더 많은 정보에 접근하고, 더 정교한 판단을 하고, 더 빠르게 결과물을 만들 수 있게 한다. 다른 한편으로 AI는 기존 노동 구조를 불안정하게 만든다. 인간이 해오던 많은 역할이 대체되거나 재조합되면서, 노동을 중심으로 유지되던 정체성이 흔들리기 시작한다.\n\n즉, AI는 단순히 더 능력 있는 개인을 만드는 것이 아니다. 더 능력 있는 개인과 동시에 정체성의 공백을 경험하는 개인을 만들어낸다. 이 이중 변화가 이후의 모든 단계의 출발점이다.\n\n\n### 2장. 개인의 변화, 더 유능해졌지만 나는 누구인가\n\n기술 변화의 첫 번째 효과는 개인의 변화다. AI를 활용하는 개인은 과거보다 훨씬 넓은 영역에서 스스로 판단하고 실행할 수 있게 된다. 과거에는 조직, 전문가, 제도에 의존해야 했던 일이 점점 개인 단위에서도 가능해진다. 분석, 기획, 문서 작성, 학습, 조언, 조정, 심지어 일부 의사결정까지 개인이 직접 감당할 수 있게 된다.\n\n그러나 여기서 끝나지 않는다. 개인의 역량이 커질수록 기존 노동 질서 안에서 자신의 위치를 설명하던 언어가 흔들린다. 산업화 사회에서 개인은 대체로 직업을 통해 자신을 정의했다. 나는 무엇을 잘하는 사람인가 이전에, 나는 어느 조직에 속한 누구인가가 정체성의 중심이었다. 안정된 직업, 승진 경로, 조직 내 역할 분담은 개인의 생계뿐 아니라 자기 설명의 틀이었다.\n\nAI는 이 틀을 약화시킨다. 이전보다 더 많은 일을 혼자 해낼 수 있는데, 동시에 내가 하던 일이 시장에서 덜 희소해진다. 역량은 커지는데 역할의 안정성은 줄어든다. 바로 여기서 개인은 정체성의 공백을 경험한다. 나는 단지 직업을 수행하는 노동자인가, 아니면 더 넓게 판단하고 기여할 수 있는 존재인가. 이 질문은 단순한 심리 문제가 아니라 AI 전환이 만들어내는 구조적 질문이다.\n\n한 번 스스로 더 많이 판단하고 더 많이 만들 수 있게 된 개인은, 이전처럼 타인의 판단에만 종속된 위치로 돌아가기를 원하지 않는다. 개인의 변화는 곧 개인의 갈망 변화를 낳는다.\n\n\n### 3장. 개인의 갈망, 더 많이 벌기보다 더 자율적으로 살고 싶다\n\n개인의 변화 다음에는 개인의 갈망이 온다. 실제로 사회를 움직이는 것은 능력 그 자체가 아니라, 능력이 낳는 갈망이다.\n\n역량이 확장된 개인은 이전과 다른 것을 원하게 된다. 첫째, 더 큰 자율을 원한다. 스스로 판단할 수 있게 된 개인은 더 이상 불필요한 위계와 세세한 통제를 견디기 어려워한다. 둘째, 더 큰 의미를 원한다. 단지 생계를 위해 주어진 업무를 반복하는 것만으로는 자신을 설명하기 어려워진다. 셋째, 더 분명한 기여를 원한다. 직업적 지위보다 내가 실제로 어떤 변화를 만들었는지가 더 중요한 기준으로 떠오른다. 넷째, 더 정당한 인정을 원한다. 직책과 연차보다 실제 문제 해결 능력과 기여도가 더 중요한 기준이 되어야 한다고 느낀다.\n\n그 결과 사람들은 위계 대신 자율을, 소비 대신 기여를, 직업적 명함 대신 의미 있는 역할을 추구하게 된다. 이 갈망은 기존 제도와 충돌한다. 산업화 시대의 제도는 안정적인 대량 노동과 위계적 조정을 전제로 설계되었지만, AI로 강화된 개인은 그 구조 안에서 점점 답답함을 느낀다.\n\n결국 개인의 갈망은 공동체 재편의 압력으로 이어진다.\n\n\n### 4장. 공동체의 변화, 7개 층위는 어떻게 재편되는가\n\n태재에서 공동체는 단순한 소속 집단이 아니다. 공동체는 개인들로부터 제한된 권한을 위임받아 공공 질서를 유지하는 구조다. 그리고 이 공동체는 가정, 이웃, 마을, 도시, 국가, 글로벌, 생태계라는 층위 구조를 가진다. 디지털 시대의 공동체 변화를 말하려면, 개인의 변화 이후 이 7개 층위가 각각 어떻게 재편되는지 봐야 한다.\n\n**첫째, 가정의 변화다.**\n가정은 가장 가까운 돌봄과 생활조정의 단위다. AI와 디지털 기술은 교육, 건강관리, 가사조정, 정보 접근을 개인과 가족 단위에서 더 많이 처리할 수 있게 만든다. 그 결과 가정은 외부 제도에 대한 의존을 일부 줄이는 동시에, 돌봄과 정서적 지지의 중요성은 더 커진다.\n\n**둘째, 이웃의 변화다.**\n이웃은 일상적 신뢰와 상호부조의 가장 작은 사회적 단위다. 디지털 기술은 물리적 근접성만으로 형성되던 관계를 약화시킬 수도 있지만, 동시에 생활 문제를 빠르게 협력하고 연결하는 새로운 지역 네트워크를 만들 수도 있다. 이웃은 더 이상 자동으로 주어지는 공동체가 아니라, 다시 설계해야 하는 생활 협력망이 된다.\n\n**셋째, 마을의 변화다.**\n마을은 생활세계의 집합적 조정 단위다. 과거에는 중앙집중적 행정과 시장이 마을의 기능을 상당 부분 흡수했지만, 디지털 시대에는 오히려 교육, 돌봄, 복지, 생활 인프라를 더 세밀하게 조정하는 지역 단위의 중요성이 다시 커질 수 있다. 마을은 행정의 하위 단위가 아니라, 실제 삶을 지탱하는 실험 단위가 된다.\n\n**넷째, 도시의 변화다.**\n도시는 앞으로 가장 중요한 재설계 단위가 될 가능성이 크다. 개인과 지역 공동체가 감당할 수 없는 인프라, 이동, 주거, 데이터, 공공서비스를 도시가 어떻게 설계하느냐에 따라 디지털 시대의 삶의 질이 달라질 수 있기 때문이다. 국가는 너무 크고, 개인은 너무 작다. 도시가 그 사이에서 가장 유력한 조정 단위로 부상할 수 있다.\n\n**다섯째, 국가의 변화다.**\n산업화 시대 국가는 개인의 삶 전반에 깊이 개입했다. 안보, 교육, 의료, 금융, 이동, 정보 흐름을 폭넓게 통제했다. 그러나 AI와 디지털 기술이 개인과 지역의 자율 역량을 키울수록, 국가는 모든 것을 직접 관리하는 구조에서 벗어나야 한다. 대신 개인과 하위 공동체가 감당할 수 없는 국방, 재난, 법질서, 기본 인프라, 대규모 조정 기능에 더 집중하는 방향으로 재정의될 가능성이 크다.\n\n**여섯째, 글로벌 공동체의 변화다.**\nAI 전환은 한 국가 내부에서만 끝나지 않는다. 기술패권, 플랫폼 독점, 공급망, 데이터, 안보 위험은 모두 국가와 국가, 사회와 사회 사이의 문제다. 따라서 글로벌 공동체는 더 이상 도덕적 선언의 차원이 아니라, 실제 규칙과 조정 메커니즘을 필요로 하는 수준으로 이동한다.\n\n**일곱째, 생태계의 변화다.**\n디지털 시대의 전환은 인간 사회 내부의 관계만이 아니라, 인간이 자연과 맺는 관계의 재설계도 요구한다. 에너지, 자원, 기후, 환경 부담을 무시한 채 디지털 전환을 말할 수 없기 때문이다. 생태계는 더 이상 배경 조건이 아니라, 인간 공동체 질서의 지속 가능성을 규정하는 최종 층위가 된다.\n\n이 7개 층위를 관통하는 변화는 같다. 개인의 역량이 커질수록 공동체에 대한 무제한적 위임은 줄어들고, 공동체는 더 제한된 권한과 더 분명한 목적 위에서 다시 설계되어야 한다. 공동체는 사라지지 않는다. 오히려 더 중요해진다. 다만 그것은 산업화 시대처럼 강제된 소속의 구조가 아니라, 선택된 연결과 필요한 위임의 구조로 재편된다.\n\n\n### 5장. 질서의 변화, 공동체 재편은 무엇을 바꾸는가\n\n공동체의 재편은 곧 질서의 변화를 뜻한다. 질서는 단지 개인과 사회의 관계만이 아니라, 사회와 사회 사이의 관계까지 포함한 패턴의 총체다. 따라서 디지털 시대의 변화는 생활방식 변화에 그치지 않고, 경제질서와 정치질서의 재편으로 이어진다.\n\n먼저 **경제질서**는 개인과 공동체가 생산, 분배, 교환을 어떻게 조직하는가의 문제다. 개인의 역량이 확장되고 공동체의 위임 구조가 바뀌면, 노동 중심의 가치 평가와 분배 체계는 흔들린다. 반복 가능한 지적 노동의 희소성은 줄어들고, 실제 문제 해결, 신뢰 형성, 돌봄, 해석, 조정, 공동체 유지 같은 기여의 중요성은 커진다. 시장은 계속 존재하겠지만, 시장 가격만으로 인간의 가치를 설명하던 질서는 약해질 수밖에 없다.\n\n이 지점에서 폴라니는 서사의 주인공이 아니라 역사적 근거가 된다. 지금의 시장경제 또는 자본주의 역시 인류 역사에서 자연스럽게 주어진 체제가 아니라, 특정한 시기에 형성된 제도적 질서였다는 점을 분명히 해준다. 그렇다면 AI 시대에 그 질서가 다시 재구성될 수 있다는 생각도 공상으로만 볼 수 없다. 우리는 역사를 통해 미래를 예상하고 대비하는 기관이기 때문에, 경제질서의 역사성을 분명히 보는 일이 중요하다.\n\n다음으로 **정치질서**는 권한 위임과 정당성의 구조가 어떻게 바뀌는가의 문제다. 개인이 더 많은 판단과 실행을 직접 할 수 있게 되고, 공동체의 각 층위가 다시 설계되면, 국가와 제도의 정당성 기준도 달라진다. 왜 이만큼의 권한을 위임해야 하는가, 왜 이 수준의 통제가 필요한가라는 질문이 더 강하게 제기된다. 정치질서는 결국 위임의 범위를 다시 정하는 방향으로 재편될 가능성이 크다.\n\n그리고 이 질서 변화는 국내 차원에 머물지 않는다. 사회와 사회 사이의 관계, 즉 국제질서 역시 흔들린다. 기술 격차, 규범 경쟁, 플랫폼 지배, 안보 위험은 모두 사회-사회 관계의 문제이기 때문이다.\n\n\n### 6장. 새로운 거버넌스와 사회계약, 무엇을 다시 설계해야 하는가\n\n여기서부터 거버넌스 문제가 등장한다. 그러나 거버넌스는 출발점이 아니라 결과다. 기술이 개인을 바꾸고, 개인의 갈망이 공동체를 바꾸고, 공동체의 변화가 경제질서와 정치질서를 재편한 뒤에야, 우리는 어떤 제도와 사회계약이 필요한지 묻게 된다.\n\n새로운 사회계약의 핵심 질문은 분명하다. 개인은 어디까지 직접 판단하고 책임질 수 있는가. 공동체와 국가는 어디까지 대신 결정하고 개입할 수 있는가. 무엇을 개인의 자율 영역으로 남기고, 무엇을 공동의 보호 영역으로 둘 것인가. 즉, 위임의 범위를 다시 정해야 한다.\n\n이 사회계약은 세 가지 축을 포함해야 한다.\n\n첫째, 개인의 자율을 불필요하게 제약하지 않는 제도 설계다.\n둘째, 공동체 해체와 극단적 불평등을 막는 보호 장치다.\n셋째, 글로벌 차원의 거버넌스다. AI 전환은 한 국가 내부에서만 끝나지 않는다. 기술패권, 플랫폼 독점, 안보 위험, 국제 규범 경쟁은 모두 사회와 사회 사이의 문제다. 따라서 거버넌스는 단순한 국내 제도의 연장이 아니라, 글로벌 수준에서 누가 규칙을 만들고 누가 집행하며 누가 정당성을 부여하는가의 문제를 포함해야 한다.\n\n결국 새로운 거버넌스는 기술 규제만을 뜻하지 않는다. 그것은 새로운 위임 구조, 새로운 보호 장치, 새로운 공공 인프라, 새로운 국제 규범을 함께 설계하는 일이다.\n\n\n### 7장. 왜 지금 다시 설계해야 하는가\n\nAI 전환의 속도는 이전과 다르다. 개인은 이미 바뀌고 있고, 공동체는 이미 재편 압력을 받고 있다. 그러나 경제질서와 정치질서, 제도와 거버넌스는 아직 그 속도를 따라가지 못하고 있다. 이 간극이 커질수록 갈등은 심해질 수밖에 없다.\n\n지금 필요한 것은 솔루션의 나열이 아니다. 개인의 변화와 갈망이 어떤 공동체 재편을 낳고, 그 공동체 재편이 어떤 질서 전환을 압박하는지, 그 결과 어떤 사회계약과 거버넌스가 필요한지를 하나의 서사로 설득력 있게 제시하는 일이다.\n\n그것이 지금 다시 설계해야 하는 이유다.\n\n---\n\nnarrative v0.4.4 · 태재미래전략연구원 디지털팀 · 2026-04-15\n"}, {"version": "v0.4.3", "filename": "narrative-v0.4.3.md", "content": "# 개인의 시대\n\n## AI 전환이 개인의 갈망, 공동체의 재편, 새로운 사회계약으로 이어지는 과정\n\n태재미래전략연구원 디지털팀 · narrative v0.4.3 · 2026\n\n---\n\n### 프롤로그\n\nAI를 둘러싼 지금의 논의는 대체로 두 갈래로 갈린다. 하나는 기술의 성능과 위험을 말하는 논의이고, 다른 하나는 곧바로 규제와 거버넌스로 넘어가는 논의다. 그러나 이 두 논의 사이에는 비어 있는 층위가 있다. 기술이 먼저 무엇을 바꾸는지, 그 변화가 인간에게 어떤 갈망을 낳는지, 그 갈망이 공동체와 경제 질서를 어떻게 흔드는지에 대한 설명이 빠져 있다.\n\n우리가 먼저 봐야 할 것은 기술 그 자체가 아니다. 기술이 바꾸는 개인이다. 그리고 그 변화한 개인이 더 이상 무엇으로 살고 싶어 하는지, 무엇을 견딜 수 없게 되는지, 어떤 공동체를 원하게 되는지다. 이 과정을 거치지 않고 거버넌스를 말하면 제도는 공중에 뜬다.\n\nAI 전환은 다음과 같은 순서로 이해하는 것이 더 자연스럽다.\n\n디지털 기술의 등장 → 개인의 변화 → 개인의 갈망 → 공동체의 변화 → 경제 질서의 재편 → 새로운 거버넌스와 사회계약\n\n이 순서를 따라가야 지금 우리가 어디에 서 있는지, 무엇을 먼저 설계해야 하는지가 보인다.\n\n\n### 1장. 디지털 기술의 등장, 무엇이 달라졌는가\n\n디지털 기술, 특히 AI와 자동화, 플랫폼 기술은 이전의 산업 기술과 다른 방식으로 사회에 침투하고 있다. 이전 기술이 인간의 육체 노동이나 정보 접근을 확장했다면, AI는 판단, 분석, 기획, 조정 같은 영역까지 빠르게 잠식하고 있다. 지금 확장되고 있는 것은 단순 생산성이 아니라 개인이 스스로 처리할 수 있는 역량의 범위다.\n\n이 변화는 두 방향에서 동시에 일어난다. 한편으로 AI는 개인을 더 유능하게 만든다. 더 적은 시간과 비용으로 더 많은 정보에 접근하고, 더 정교한 판단을 하고, 더 빠르게 결과물을 만들 수 있게 한다. 다른 한편으로 AI는 기존 노동 구조를 불안정하게 만든다. 인간이 해오던 많은 역할이 대체되거나 재조합되면서, 노동을 중심으로 유지되던 정체성이 흔들리기 시작한다.\n\n즉, AI는 단순히 더 능력 있는 개인을 만드는 것이 아니다. 더 능력 있는 개인과 동시에 정체성의 공백을 경험하는 개인을 만들어낸다. 이 이중 변화가 이후의 모든 단계의 출발점이다.\n\n\n### 2장. 개인의 변화, 더 유능해졌지만 나는 누구인가\n\n기술 변화의 첫 번째 효과는 개인의 변화다. AI를 활용하는 개인은 과거보다 훨씬 넓은 영역에서 스스로 판단하고 실행할 수 있게 된다. 과거에는 조직, 전문가, 제도에 의존해야 했던 일이 점점 개인 단위에서도 가능해진다. 분석, 기획, 문서 작성, 학습, 조언, 조정, 심지어 일부 의사결정까지 개인이 직접 감당할 수 있게 된다.\n\n그러나 여기서 끝나지 않는다. 개인의 역량이 커질수록 기존 노동 질서 안에서 자신의 위치를 설명하던 언어가 흔들린다. 산업화 사회에서 개인은 대체로 직업을 통해 자신을 정의했다. 나는 무엇을 잘하는 사람인가 이전에, 나는 어느 조직에 속한 누구인가가 정체성의 중심이었다. 안정된 직업, 승진 경로, 조직 내 역할 분담은 개인의 생계뿐 아니라 자기 설명의 틀이었다.\n\nAI는 이 틀을 약화시킨다. 이전보다 더 많은 일을 혼자 해낼 수 있는데, 동시에 내가 하던 일이 시장에서 덜 희소해진다. 역량은 커지는데 역할의 안정성은 줄어든다. 바로 여기서 개인은 정체성의 공백을 경험한다. 나는 단지 직업을 수행하는 노동자인가, 아니면 더 넓게 판단하고 기여할 수 있는 존재인가. 이 질문은 단순한 심리 문제가 아니라 AI 전환이 만들어내는 구조적 질문이다.\n\n이 지점이 중요하다. 역량 확장은 단지 효율의 문제가 아니다. 그것은 개인이 스스로에 대해 품는 기대 수준을 바꾼다. 한 번 스스로 더 많이 판단하고 더 많이 만들 수 있게 된 개인은, 이전처럼 타인의 판단에만 종속된 위치로 돌아가기를 원하지 않는다.\n\n\n### 3장. 개인의 갈망, 더 많이 벌기보다 더 자율적으로 살고 싶다\n\n개인의 변화 다음에는 개인의 갈망이 온다. 이것이 AI 전환 서사에서 가장 자주 빠지는 층위다. 그러나 실제로 사회를 움직이는 것은 능력 그 자체가 아니라, 능력이 낳는 갈망이다.\n\n역량이 확장된 개인은 이전과 다른 것을 원하게 된다. 첫째, 더 큰 자율을 원한다. 스스로 판단할 수 있게 된 개인은 더 이상 불필요한 위계와 세세한 통제를 견디기 어려워한다. 왜 내가 결정할 수 있는 일을 상급자의 승인과 조직의 절차에 계속 종속시켜야 하는가라는 질문이 생긴다.\n\n둘째, 더 큰 의미를 원한다. 단지 생계를 위해 주어진 업무를 반복하는 것만으로는 자신을 설명하기 어려워진다. 무엇을 생산했는가보다 왜 이 일을 하는가, 이 일이 누구에게 어떤 변화를 만드는가가 중요해진다.\n\n셋째, 더 분명한 기여를 원한다. 개인은 단순히 노동력을 판매하는 존재가 아니라, 실제 변화를 만드는 존재로 인정받고 싶어 한다. 직업적 지위나 조직 내 직급보다, 내가 실제로 어떤 기여를 했는지가 더 중요한 기준으로 떠오른다.\n\n넷째, 더 정당한 인정을 원한다. 과거에는 직책, 연차, 제도적 권위가 인정의 기준이었다면, 이제는 실제 문제 해결 능력과 기여도가 더 중요하다고 느끼게 된다. 그 결과 사람들은 위계 대신 자율을, 소비 대신 기여를, 직업적 명함 대신 의미 있는 역할을 추구하게 된다.\n\n이 갈망은 기존 질서와 충돌한다. 산업화 시대의 제도는 안정적인 대량 노동과 위계적 조정을 전제로 설계되었다. 그러나 AI로 강화된 개인은 그 구조 안에서 점점 답답함을 느낀다. 결국 개인의 갈망은 공동체 재편의 압력으로 이어진다.\n\n\n### 4장. 공동체의 변화, 강제된 소속에서 선택된 연결로\n\n공동체는 고정된 실체가 아니다. 공동체는 개인들이 가치와 이익, 정체성을 공유하며 형성하는 관계 구조다. 산업화 시대의 공동체는 대체로 거주지, 직장, 국가, 제도적 소속을 중심으로 조직되었다. 사람들은 자신이 속한 조직과 지역, 국가 안에서 역할을 부여받고 살아갔다.\n\n그러나 개인의 갈망이 바뀌면 공동체의 형태도 바뀐다. 더 자율적이고 더 의미 중심적인 개인은 자신이 원하지 않는 위계와 규율에 덜 순응한다. 그 결과 공동체는 강한 의무와 고정된 소속 중심에서, 더 선택적이고 더 관심사 기반이며 더 정체성 기반의 구조로 이동하기 시작한다.\n\n이 변화는 두 축에서 나타난다.\n\n첫째는 관계의 축이다. 사람들은 단지 같은 지역에 산다는 이유만으로 묶이기보다, 같은 문제의식, 같은 관심사, 같은 정체성, 같은 프로젝트를 중심으로 더 강하게 연결된다. 선택적 공동체가 커지는 이유다.\n\n둘째는 공간의 축이다. 가정, 마을, 도시의 역할이 다시 재편된다. 개인이 중앙집중적 시스템에 전적으로 의존하지 않고도 더 많은 것을 스스로 처리할 수 있게 되면, 생활과 협력의 단위는 다시 아래로 내려온다. 국가는 모든 것을 직접 통제하는 주체라기보다, 개인과 지역 공동체가 감당할 수 없는 영역에 집중해야 하는 방향으로 재조정된다.\n\n핵심은 위임의 축소와 자율의 확대다. 공동체는 사라지지 않는다. 오히려 더 중요해진다. 다만 그것은 산업화 시대처럼 강제된 소속의 형태가 아니라, 선택된 연결과 상호 필요의 형태로 재구성된다.\n\n\n### 5장. 경제 질서의 재편, 노동 중심 사회에서 기여 중심 사회로\n\n공동체가 바뀌면 경제 질서도 바뀐다. 지금의 경제 질서는 개인이 자신의 노동과 능력을 시장에서 가격으로 교환하는 구조 위에 서 있다. 직업은 생계 수단일 뿐 아니라 사회적 지위와 인정의 기준이었고, 노동은 분배의 핵심 원리였다.\n\n그러나 AI 전환은 이 전제를 흔든다. 많은 지적 노동이 빠르게 대체되거나 재조합될 수 있기 때문이다. 노동 시간이 길다고 가치가 높아지는 구조는 약해지고, 반복 가능한 작업의 희소성은 줄어든다. 반면 실제 문제를 해결하고, 공동체에 의미 있는 변화를 만들고, 신뢰와 돌봄, 해석과 조정 같은 인간적 영역에서 기여하는 능력의 중요성은 커진다.\n\n이 변화는 단지 일자리 감소의 문제가 아니다. 무엇을 가치로 볼 것인가의 기준이 바뀌는 문제다. 노동 중심 분배 체계가 점점 약해지고, 기여 중심의 인정과 분배 체계가 부상할 가능성이 커진다. 개인은 단지 시간을 팔아 임금을 얻는 존재가 아니라, 공동체와 사회에 어떤 실질적 기여를 했는가로 평가받게 된다.\n\n이 과정에서 플랫폼 독점 문제도 더 선명해진다. AI와 디지털 플랫폼이 개인 역량을 확장시키는 동시에, 소수 기업이 인프라와 데이터, 유통 경로를 독점하면 개인의 자율은 다시 종속될 수 있다. 따라서 미래 경제 질서는 단순한 시장 경쟁만으로 유지되지 않는다. 공공 AI 인프라, 접근권, 분배 원리, 기여 측정 방식까지 새롭게 설계해야 한다.\n\n중요한 것은 여기서 특정 학자의 이름이 아니라 문제의 구조다. 지금 흔들리는 것은 일자리 몇 개가 아니라, 인간의 가치가 시장 가격으로만 측정되던 질서 전체다. 시장은 계속 존재하겠지만, 시장만으로 인간의 기여를 설명하고 분배를 정당화하는 시대는 약해질 가능성이 크다.\n\n\n### 6장. 새로운 거버넌스와 사회계약, 무엇을 다시 설계해야 하는가\n\n여기서부터 거버넌스 문제가 등장한다. 그러나 거버넌스는 출발점이 아니라 결과다. 기술이 개인을 바꾸고, 개인의 갈망이 공동체를 바꾸고, 공동체의 변화가 경제 질서를 재편한 뒤에야, 우리는 어떤 제도와 사회계약이 필요한지 묻게 된다.\n\n새로운 사회계약의 핵심 질문은 분명하다. 개인은 어디까지 직접 판단하고 책임질 수 있는가. 공동체와 국가는 어디까지 대신 결정하고 개입할 수 있는가. 무엇을 개인의 자율 영역으로 남기고, 무엇을 공동의 보호 영역으로 둘 것인가. 즉, 위임의 범위를 다시 정해야 한다.\n\n이 사회계약은 세 가지 축을 포함해야 한다.\n\n첫째, 개인의 자율을 불필요하게 제약하지 않는 제도 설계다. AI로 강화된 개인에게 과거와 같은 과잉 통제 구조를 유지하면 갈등은 더 커진다.\n\n둘째, 공동체 해체와 극단적 불평등을 막는 보호 장치다. 개인의 자율이 중요해질수록 오히려 공공 인프라와 안전망, 기본적 접근권은 더 중요해진다.\n\n셋째, 글로벌 차원의 거버넌스다. AI 전환은 한 국가 내부에서만 끝나지 않는다. 기술패권, 플랫폼 독점, 안보 위험, 국제 규범 경쟁은 모두 사회와 사회 사이의 문제다. 따라서 거버넌스는 단순한 국내 제도의 연장이 아니라, 글로벌 수준에서 누가 규칙을 만들고 누가 집행하며 누가 정당성을 부여하는가의 문제를 포함해야 한다.\n\n결국 새로운 거버넌스는 기술 규제만을 뜻하지 않는다. 그것은 새로운 위임 구조, 새로운 보호 장치, 새로운 공공 인프라, 새로운 국제 규범을 함께 설계하는 일이다.\n\n\n### 7장. 지금 우리의 시작점\n\n지금 우리의 보고서 시작점은 마지막 단계에 가까워 보이지만, 실제로는 맨 앞에서부터 다시 정리해야 한다. 거버넌스와 제도 설계를 말하려면 먼저 개인의 변화와 갈망을 설득력 있게 보여줘야 한다. 그래야 공동체 재편의 방향이 이해되고, 그래야 경제 질서 전환의 필요가 설명되며, 그래야 마지막 사회계약과 거버넌스가 공중에 뜨지 않는다.\n\n지금 필요한 것은 솔루션의 나열이 아니다. AI가 만든 개인의 변화가 어떤 갈망을 낳고, 그 갈망이 어떤 사회 변화를 압박하는지, 그 결과 어떤 질서 재편이 불가피한지를 우리 언어로 정확히 설명하는 일이다.\n\n태재의 작업은 여기에 있다. 기술을 설명하는 것도 아니고, 기존 학자의 이론을 번역하는 것도 아니다. AI 전환이 개인과 공동체, 경제와 거버넌스를 어떻게 다시 묶는지를 하나의 서사로 설계하는 것이다.\n\n---\n\nnarrative v0.4.3 · 태재미래전략연구원 디지털팀 · 2026-04-15\n"}, {"version": "v0.4.2", "filename": "narrative-v0.4.2.md", "content": "# 개인의 시대\n\n## 개인 역량 확장이 초래하는 경제 질서의 전환, 그리고 그 이후의 공동체\n\n태재미래전략연구원 디지털팀 · narrative v0.4.2 · 2026\n\n---\n\n### 프롤로그: 순서를 다시 묻는다\n\n사회가 바뀔 때, 무엇이 먼저 바뀌는가.\n\n역사를 보면 반복적으로 개인의 변화가 전환의 출발점이 되었다. 기술이 개인의 역량을 확장하면, 개인이 달라지고, 그 달라진 개인들 사이에서 새로운 경제 관계가 생겨나고, 공동체가 따라 달라졌다. 대체로 이런 순서로 전개되었다.\n\n그런데 지금의 AI 논의는 이 순서를 건너뛴다. 기술의 성능과 위험을 말하고, 곧바로 규제와 거버넌스로 넘어간다. 경제 질서가 어떻게 바뀌는지, 개인과 사회의 관계가 어떻게 달라지는지, 그 변화가 어떤 제도와 거버넌스를 요구하는지에 대한 해석 없이 제도를 말하면, 그 제도는 공중에 뜬다. 방향 없는 규제는 통제일 뿐이고, 근거 없는 금지는 반발만 부른다.\n\n지금 필요한 것은 솔루션의 나열이 아니다. 변화의 논리를 더 정확히 이해하는 일이다. 거버넌스는 그 이해 위에서 비로소 작동한다.\n\n\n### 1장: 역사의 패턴, 개인이 먼저 바뀌지만 혼자 바뀌지는 않는다\n\n기술 혁신은 반복적으로 개인의 역량을 확장시켜 왔다. 그리고 매번 같은 순서로 세상이 바뀌었다.\n\n핵심 공식은 이렇다. 기술이 개인의 역량을 확장하면, 자유와 책임의 범위가 넓어지고, 사회와 공동체의 질서가 재편되며, 경제 질서가 재형성되고, 마지막으로 정치 질서와 거버넌스의 문제가 재구성된다.\n\n농업 기술은 식량 생산을 개인 및 소집단 단위로 가능하게 했다. 잉여가 생기면서 분업이 시작됐고, 분업은 계급을 만들었다. 인쇄술은 지식 접근의 비용을 급격히 낮춰 종교와 귀족 계층의 정보 독점을 해체했다. 지식이 확산되자 기존 권위의 정당성이 흔들렸고, 종교개혁과 계몽주의가 뒤따랐다. 산업 기계는 물적 생산 역량을 개인 자본에 개방하며 봉건적 생산 질서를 무너뜨렸다. 공장이 들어서면서 노동의 형태가 바뀌었고, 도시가 팽창했으며, 국가의 역할이 근본적으로 재정의됐다. 인터넷은 정보 유통의 비대칭성을 완화하며, 미디어와 유통 권력을 분산시켰다. 누구나 정보를 생산하고 배포할 수 있게 되자, 정보 독점에 의존하던 권위 구조가 약화되기 시작했다.\n\nAI는 이 연장선에 있다. 단, 이번에 확장되는 역량은 단순 노동이나 정보 접근이 아니라 판단과 추론이다. 이것이 이전 전환들과 결정적으로 다른 지점이다. 판단 능력은 지금까지 위계 구조의 핵심 정당성이었다. 전문가, 관리자, 의사결정자의 권위는 정보와 판단의 비대칭성에서 나왔다. 의사는 진단 능력으로, 변호사는 법률 해석 능력으로, 관리자는 종합적 판단 능력으로 권위를 유지해 왔다. AI는 그 비대칭을 해소하고 있다. 비대칭이 해소되면, 그 위에 서 있던 위계도 흔들린다.\n\n다만 여기서 중요한 보정이 필요하다. 개인이 먼저 바뀐다는 말은 개인이 사회와 무관하게 독립적으로 변화한다는 뜻이 아니다. 개인의 동기와 선호, 행동 양식은 언제나 그가 속한 사회제도에 의해 구성된다. 기술이 개인 역량을 확장하면 개인이 달라지지만, 그 개인이 어떻게 행동하고 어떤 방향으로 움직일지는 그 사회가 가진 제도와 규범이 함께 결정한다. 개인과 사회는 단방향 인과가 아니라 양방향 구성 관계에 있다.\n\n\n### 2장: 전환의 연쇄, 다섯 개념으로 다시 본다\n\nAI 전환을 이해하려면 개념의 순서를 정확히 잡아야 한다. 여기서 중요한 다섯 개념은 개인, 사회, 질서, 제도, 거버넌스다. 이 다섯 개념은 독립적으로 존재하는 것이 아니라 서로를 구성하는 관계 속에서만 의미를 가진다.\n\n**개인**은 사회의 기본 단위다. 개인은 안전과 건강을 최우선으로 추구하는 존재다. 그러나 개인의 동기와 선호는 고정된 본성이 아니라 사회제도에 의해 외생적으로 구성된다.\n\n**사회**는 개인들의 단순 집합이 아니라 가치, 이익, 신념을 공유하는 관계의 총체다. 사회는 개인을 구성하는 동시에 개인에 의해 다시 구성된다.\n\n**질서**는 관계 패턴의 총체다. 여기에는 개인과 사회의 관계뿐 아니라 사회와 사회의 관계까지 포함된다. 경제질서, 정치질서, 안보질서 같은 복수의 하위 질서가 여기에 속한다.\n\n**제도**는 질서를 구현하고 강제하는 구체적 장치다. 법, 규범, 시장규칙, 소유권, 통화제도, 도시계획권 같은 것들이 여기에 해당한다. 제도는 자연물이 아니라 설계된 것이며, 따라서 재설계될 수 있다.\n\n**거버넌스**는 글로벌 수준의 제도 설계다. 그러나 이것은 단순한 공간적 확장이 아니다. 누가 규칙을 만들고, 누가 집행하며, 누가 정당성을 부여하는가라는 행위자 문제가 거버넌스의 핵심에 있다.\n\n이렇게 보면 전환의 연쇄는 다음과 같이 정리된다.\n\n기술은 개인 역량을 확장한다. 확장된 개인은 기존 권위 구조와 위임 구조를 흔든다. 그러나 그 변화는 언제나 사회와의 피드백 속에서 나타난다. 이 상호작용은 질서의 변화를 낳고, 질서 변화는 제도 변화를 요구하며, 제도의 범위가 글로벌 수준으로 올라가면 곧바로 거버넌스 문제가 된다.\n\n\n### 3장: 개인과 사회의 양방향 피드백\n\n개인은 공동체의 출발점이자 가장 기본이 되는 단위다. 개인은 본질적으로 안전과 건강을 최우선으로 추구하는 존재다. 이것은 모든 사회 설계의 출발점이 되어야 한다.\n\n그러나 개인은 사회 밖에서 존재하지 않는다. 개인의 욕망과 선택, 행동 가능성은 사회의 제도적 조건 안에서 형성된다. 같은 기술이 등장해도 어떤 사회에서는 개인의 자율성이 확장되고, 어떤 사회에서는 감시와 통제가 강화된다. 같은 AI라도 어떤 공동체에서는 창의성과 협력이 강화되고, 어떤 공동체에서는 대량 실업과 극단주의로 이어질 수 있다. 차이를 만드는 것은 기술 그 자체만이 아니라, 그 기술을 둘러싼 사회제도다.\n\n그래서 개인과 사회는 양방향 피드백 루프로 이해해야 한다. 디지털 기술이 개인 역량을 확장한다. 역량이 확장된 개인은 새로운 요구와 행동을 만들어낸다. 그 결과 사회제도가 변화한다. 그런데 바뀐 사회제도는 다시 개인의 동기와 행동을 재구성한다. 이 순환을 이해해야 전환의 실제 경로가 보인다.\n\n공동체는 가정에서 시작해 이웃, 마을, 도시, 국가, 글로벌, 생태계로 확장되는 층위 구조를 가진다. 그러나 공동체는 고정된 실체가 아니다. 공동체는 가치와 이익을 공유하는 관계 질서이며, 개인들로부터 제한된 권한을 위임받아 공공 질서를 유지한다. 핵심은 그 권한이 미션에 종속된다는 점이다. 공공 질서 유지라는 미션이 종료되면 권한도 축소되어야 한다.\n\n산업화 시대에는 공동체와 국가에 위임된 권한이 개인의 자유를 광범위하게 제약했다. 안보, 사법, 의료, 교육, 금융 같은 영역에서 개인은 집단 인프라에 깊이 의존해야 했기 때문이다. AI는 이 의존성을 체계적으로 해소하고 있다. 개인이 AI를 통해 전문적 판단과 분석 역량을 갖추게 되면, 기존에 공동체가 수행하던 역할의 상당 부분을 개인이 직접 수행할 수 있게 된다. 의존성의 구조가 바뀌면 위임의 구조도 바뀌어야 한다.\n\n그러나 여기에도 역설이 있다. AI가 효율성과 생산성의 상당 부분을 떠맡을수록, 인간의 삶에서 더 중요해지는 것은 관계, 신뢰, 돌봄, 소속, 상호 책임이다. 개인은 강화되지만, 공동체가 사라지는 것은 아니다. 오히려 공동체는 강제와 의존이 아니라 선택과 상호 필요의 기반 위에서 다시 중심에 들어온다.\n\n\n### 4장: 질서의 재정의, 개인-사회에서 사회-사회로\n\n질서를 개인과 사회의 관계로만 이해하면 AI 전환의 절반만 보게 된다. 태재가 다루려는 문제는 국내 질서의 변화에 그치지 않는다. 국가와 국가, 사회와 사회 사이의 관계가 어떻게 재편되는가까지 포함해야 한다.\n\n질서는 개인-사회 관계 패턴과 사회-사회 관계 패턴을 모두 포함하는 총체다. 경제질서는 생산, 분배, 교환의 관계 패턴이고, 정치질서는 권력의 정당성과 위임 구조의 패턴이며, 안보질서는 위협 인식과 억지, 충돌 관리의 관계 패턴이다. 이 질서들은 국내 차원과 국제 차원에서 동시에 작동한다.\n\n이 확장은 거버넌스로 넘어가는 논리를 자연스럽게 만든다. 글로벌 거버넌스는 단순히 국내 제도를 국제적으로 확대하는 문제가 아니다. 사회-사회 간 질서를 어떤 규칙으로 조직할 것인가의 문제다. AI 전환은 국내 노동시장만 흔드는 것이 아니라, 국가 간 생산성 격차, 군사적 비대칭, 기술패권 경쟁, 규범 경쟁을 동시에 촉발한다. 따라서 질서 개념이 사회-사회 관계까지 포함해야만 이후의 거버넌스 논의가 성립한다.\n\n\n### 5장: 경제 질서의 전환, 왜 자본주의 이후를 묻는가\n\n지금의 자본주의는 개인이 시장에서 자신의 노동과 능력을 가격으로 교환하는 질서다. 각자의 몸값이 시장에서 결정되고, 생존 역시 그 가격 체계에 강하게 종속된다. 이 질서는 산업화 시대에 강력했다. 생산성과 효율을 끌어올리는 데 매우 효과적이었고, 개인의 동기 부여와 자원 배분 모두에서 다른 체제를 압도했다.\n\n그러나 AI는 이 질서의 전제를 흔든다. 많은 지적 노동이 빠르게 대체되거나 재조합될 수 있기 때문이다. 그 결과 개인의 경제적 가치가 지금과 같은 방식으로 계속 평가될 수 있는지 의문이 생긴다. 시장 가격만으로 인간의 기여를 측정하는 방식이 앞으로도 유지될 수 있는가. 인간이 무엇으로 가치를 인정받고, 어떤 관계 속에서 살아가며, 공동체가 무엇을 책임질 것인가. 이것이 경제 질서 질문의 출발점이다.\n\n이 질문은 단지 복지정책이나 기본소득의 문제가 아니다. 더 근본적인 질문은, AI 이후에 인간 노동의 의미가 어떻게 바뀌고, 가치의 원천이 어디로 이동하며, 그에 따라 분배와 협력의 원리가 어떻게 재구성되어야 하는가다.\n\n이 지점에서 칼 폴라니는 중요한 해석의 다리가 된다. 폴라니의 핵심 문제의식은 분명하다. 현재의 자본주의 시장경제는 자연스럽고 자생적인 질서가 아니라, 특정한 제도와 정치적 구성 위에 성립한 역사적 산물이라는 것이다.\n\n이 관점이 중요한 이유가 있다. 지금의 시장 질서가 자연 상태가 아니라면, 그 이후의 질서 역시 충분히 상상하고 설계할 수 있기 때문이다. 시장경제가 영원불변의 질서라는 전제 위에서는 AI가 초래하는 변화를 시장 내부의 조정 문제로만 볼 수밖에 없다. 그러나 폴라니의 관점에서 보면, 시장경제 자체가 하나의 역사적 실험이었다. 그 실험이 새로운 조건 앞에서 한계를 드러낸다면, 다음 실험을 설계하는 것이 가능하고 또 필요하다.\n\n폴라니는 산업혁명 이후 시장이 사회로부터 이탈했다고 분석했다. 노동, 토지, 화폐가 허구적 상품으로 시장에 편입되면서 인간의 삶 자체가 시장 논리에 종속됐다. 그 결과 사회는 자기보호 운동으로 대응했고, 그 충돌이 20세기의 정치적 격변을 만들었다.\n\nAI 시대에 이 분석은 새로운 의미를 갖는다. AI는 노동을 대체하는 것에 그치지 않는다. 판단과 추론까지 대체하면서 인간이 시장에서 가격으로 교환할 수 있는 역량의 범위 자체를 축소시킨다. 인간의 노동이 더 이상 안정적으로 가격화될 수 없다면, 시장을 중심으로 조직된 사회 전체의 작동 원리가 재검토 대상이 된다.\n\n그리고 여기서 이중운동은 다시 핵심이 된다. 제도가 시장화 방향으로 재편될수록 사회는 반드시 보호 운동으로 반작용한다. 1930년대 케인즈주의, 2008년 이후 신보호주의, 오늘날의 각종 극단주의와 포퓰리즘은 모두 이 구조의 반복으로 볼 수 있다. AI가 경제질서를 더 빠르게 시장화하고 재편할수록, 사회 보호 운동의 반작용도 더 격렬해질 수 있다. 이 반작용이 제도적으로 수용되지 못하면 내부 충돌로, 국가 간 차원에서 수용되지 못하면 패권 충돌로 이어진다.\n\n따라서 AI 전환기의 경제 질서 설계란 시장화의 충격을 사후 복지로 봉합하는 것이 아니라, 사회 보호 제도를 시장화보다 먼저 설계해 이중운동의 진폭을 줄이는 일이다.\n\n\n### 6장: 두 가지 위험, 내부 충돌과 국가 간 충돌\n\n이 전환은 자동으로 평화롭게 진행되지 않는다. 역사는 두 가지 충돌 경로를 반복적으로 보여준다.\n\n첫째, 내부 충돌이다. 기존 위계 구조에서 이익을 얻는 집단은 전환에 저항할 강한 유인을 갖는다. 이 저항이 제도적으로 수용되지 못할 때, 사회는 혁명이나 내부 분열로 이행한다. 폴라니가 분석한 이중운동 역시 이 경로의 한 형태다. 시장의 확장에 대한 사회의 자기보호가 극단적 형태를 취했을 때 파시즘이나 전체주의가 나타났다.\n\n둘째, 국가 간 충돌이다. 전환에 성공한 국가와 그렇지 못한 국가 사이의 역량 격차가 기존 국제 질서의 정당성을 무너뜨릴 때, 패권 경쟁이 격화된다. 산업화 시대의 두 차례 세계대전은 이 경로의 결과였다.\n\nAI 전환은 이 두 경로를 동시에 활성화할 가능성이 있다. 더구나 전환의 속도가 다르다. 증기기관은 수십 년에 걸쳐 확산됐지만, AI는 수년 안에 사회 전반을 바꾸고 있다. 사회가 적응할 시간이 충분하지 않을 수 있다.\n\n위험을 선별하는 기준은 두 가지다. 첫째, 돌이킬 수 없는 공멸 또는 파국의 위험인가. 둘째, 공동체 해체와 사회적 분열의 심화인가. 이 두 기준에 해당하는 위험이 AI 전환의 핵심 관리 대상이다.\n\n\n### 7장: 기술 위험의 관리, 사전 입증에서 거버넌스로\n\n기술 위험에 대한 접근은 두 갈래로 나뉜다. 하나는 사후 대응이다. 문제가 발생한 후에 규제한다. 다른 하나는 사전 입증이다. 위험하지 않음을 먼저 입증한 후에만 공개를 허용한다.\n\n사후 대응은 전통적인 기술 규제의 방식이었다. 그러나 AI의 경우 사후 대응이 충분하지 않을 수 있다. 한 번 공개된 모델은 회수할 수 없고, 그 모델이 야기하는 피해는 돌이킬 수 없는 규모에 달할 수 있기 때문이다.\n\n사전 입증 모델은 이미 작동하는 사례가 있다. 의약품의 FDA 승인 절차가 대표적이다. 기업은 자사 제품이 안전하다는 것을 스스로 입증해야 하며, 그 입증이 충분하지 않으면 시장에 내놓을 수 없다. AI에도 유사한 구조를 적용할 수 있다는 것이 이 논의의 핵심이다.\n\n그러나 여기서 한 걸음 더 나가야 한다. 거버넌스는 단순히 제도를 글로벌 차원으로 확장하는 것이 아니다. 누가 이 사전 입증 절차를 설계하고, 누가 검증하며, 누가 불이행을 제재하고, 누가 정당성을 부여할 것인가라는 행위자 문제가 반드시 따라온다. 국내 제도에는 국가라는 집행 행위자가 있지만, 글로벌 수준에서는 그에 상응하는 행위자가 부재하다. 바로 이것이 현재 세계 거버넌스의 근본 문제다.\n\n따라서 AI 거버넌스의 과제는 단순히 글로벌 기구를 만드는 것이 아니다. 글로벌 수준에서 작동 가능한 행위자 구조와 집행 메커니즘을 설계하는 것이다. 강대국 제재 메커니즘, 최고 지도자들의 결단을 실제로 끌어낼 정치적 경로, 기술개발자에 대한 입증 책임 구조, 국제적 검증체계를 함께 설계해야 한다.\n\n그리고 이 거버넌스 논의는 반드시 경제 질서에 대한 이해 위에 놓여야 한다. 기술 통제만으로는 방향이 없다. 어떤 경제 질서를 지키기 위해, 어떤 사회적 가치를 보존하기 위해 기술을 관리하는 것인지가 분명해야 한다. 금지와 승인의 논리는 경제 질서 전환이라는 맥락 속에서 비로소 설득력을 갖는다.\n\n\n### 8장: 우리가 목표하는 미래\n\n무정부 상태의 self-help 구조에서 벗어나는 것. 전쟁을 걱정하지 않아도 되는 삶, 전쟁을 대비하지 않아도 되는 삶. 이것은 단순한 평화주의가 아니다. 개인의 안전과 건강이 공동체에 대한 과도한 의존 없이도 보장되는 구조를 만드는 것이다.\n\n개인의 레벨에서는, 각자의 정체성, 재능, 원하는 바에 맞게 삶을 꾸릴 수 있는 구조다. 생존을 위해 자신의 정체성을 포기하지 않아도 되는 사회.\n\n이 두 가지는 별개가 아니다. 개인이 안전하게 자신의 삶을 살 수 있을 때 공동체에 대한 과도한 권한 위임의 필요성도 줄어든다. 역량이 확장된 개인은 더 작은 의존으로 더 큰 자율을 실현할 수 있다. 그리고 그 자율적 개인들이 선택에 의해 모여든 공동체는 강제에 의해 유지된 공동체보다 더 견고하다.\n\n\n### 9장: 왜 지금인가, 마지막 창은 짧다\n\n역사적으로 사전에 설계된 거버넌스는 작동했다. 화학무기금지협약은 화학무기의 개발과 사용을 사전에 금지하는 데 성공했다. 몬트리올 의정서는 오존층 파괴 물질의 생산을 단계적으로 중단시켰다. 공통점은 위험이 현실화되기 전에 국제적 합의가 이루어졌다는 점이다.\n\n반면 사후 봉합은 불완전했다. 핵비확산조약은 핵무기가 이미 확산된 후에 만들어졌기 때문에 구조적 불평등을 내장했다. 생물무기금지협약은 검증 메커니즘 없이 출발해 실효성에 한계가 있다.\n\nAI의 속도는 이전 전환과 다르다. 증기기관의 사회적 확산에는 수십 년이 걸렸지만, AI는 수년 안에 경제와 사회 전반에 스며들고 있다. 제도가 따라가지 못하는 속도다.\n\n지금이 마지막 창이다. 전환이 완성된 후 거버넌스를 설계하면 이미 늦다. 그리고 그 거버넌스를 설계하려면, 거버넌스가 지키고 조정해야 할 경제 질서와 사회 보호 장치의 방향이 먼저 정해져야 한다. 순서가 있다.\n\n\n### 10장: 태재가 하는 일\n\n기술의 방향을 바꾸는 것이 아니다. 전환이 전쟁이 아닌 진화로 끝날 수 있는 경로를 설계하는 것이다.\n\n이 작업은 다음 순서로 접근하는 편이 적절하다.\n\n첫째, 경제 질서의 전환에 대한 해석을 정립한다. 자본주의 이후의 질서에 관한 질문을 정확히 세우고, 폴라니를 비롯한 참조 사상가와 논의를 통해 역사적이고 이론적인 기반을 다진다. 이 논의를 AI가 만드는 개인 역량 확장과 연결해 우리 언어의 내러티브로 재구성한다.\n\n둘째, 그 해석 위에서 기술 위험의 관리 체계를 구체화한다. 사전 입증, 금지, 승인의 논리를 경제 질서 전환의 맥락 속에서 정당화하고, 국제적 규범 형성 흐름과의 접점을 만든다.\n\n셋째, 국내 질서와 국제 질서를 함께 다루는 거버넌스 설계로 나아간다. 사회-사회 관계 패턴의 변화, 글로벌 수준의 행위자 부재, 집행 메커니즘의 공백을 분석하고, 작동 가능한 제도 설계의 방향을 제시한다.\n\n넷째, 이론을 공론화하고 한국에서 실험한다. 한국은 AI 전환의 최전선에 있으면서도 사회적 합의 형성의 전통이 있는 나라다. 패권의 최전선에서 합의의 최전선으로 이동하는 것이 한국이 택할 수 있는 경로다.\n\n이 과정에서 필요한 것은 완성된 솔루션을 급히 내놓는 것이 아니다. 변화의 논리를 정확히 해석하고, 그 해석을 함께 추론하는 과정이다. 결론으로 가는 사고의 전개 과정에 함께 참여하는 것. 그 과정 자체가 접점이 되고, 접점이 누적되어 합의가 된다.\n\n---\n\nnarrative v0.4.2 · 태재미래전략연구원 디지털팀 · 2026-04-15\n"}, {"version": "v0.4.1", "filename": "narrative-v0.4.1.md", "content": "# 개인의 시대\n\n## 개인 역량 확장이 초래하는 경제 질서의 전환, 그리고 그 이후의 공동체\n\n태재미래전략연구원 디지털팀 · narrative v0.4.0 · 2026\n\n---\n\n### 프롤로그: 순서를 다시 묻는다\n\n사회가 바뀔 때, 무엇이 먼저 바뀌는가.\n\n역사를 보면 반복적으로 개인의 변화가 전환의 출발점이 되었다. 기술이 개인의 역량을 확장하면, 개인이 달라지고, 그 달라진 개인들 사이에서 새로운 경제 관계가 생겨나고, 공동체가 따라 달라졌다. 대체로 이런 순서로 전개되었다.\n\n그런데 지금의 AI 논의는 이 순서를 건너뛴다. 기술의 성능과 위험을 말하고, 곧바로 규제와 거버넌스로 넘어간다. 경제 질서가 어떻게 바뀌는지, 개인과 공동체의 관계가 어떻게 달라지는지에 대한 해석 없이 제도를 말하면, 그 제도는 공중에 뜬다. 방향 없는 규제는 통제일 뿐이고, 근거 없는 금지는 반발만 부른다.\n\n지금 필요한 것은 솔루션의 나열이 아니다. 변화의 논리를 더 정확히 이해하는 일이다. 거버넌스는 그 이해 위에서 비로소 작동한다.\n\n\n### 1장: 역사의 패턴 — 개인이 먼저 바뀐다\n\n기술 혁신은 반복적으로 개인의 역량을 확장시켜 왔다. 그리고 매번 같은 순서로 세상이 바뀌었다.\n\n핵심 공식은 이렇다. 기술이 개인의 역량을 확장하면, 자유와 책임의 범위가 넓어지고, 공동체 질서가 재편되며, 경제 질서가 재형성되고, 마지막으로 정치 질서가 재형성된다.\n\n농업 기술은 식량 생산을 개인 및 소집단 단위로 가능하게 했다. 잉여가 생기면서 분업이 시작됐고, 분업은 계급을 만들었다. 인쇄술은 지식 접근의 비용을 급격히 낮춰 종교와 귀족 계층의 정보 독점을 해체했다. 지식이 확산되자 기존 권위의 정당성이 흔들렸고, 종교개혁과 계몽주의가 뒤따랐다. 산업 기계는 물적 생산 역량을 개인 자본에 개방하며 봉건적 생산 질서를 무너뜨렸다. 공장이 들어서면서 노동의 형태가 바뀌었고, 도시가 팽창했으며, 국가의 역할이 근본적으로 재정의됐다. 인터넷은 정보 유통의 비대칭성을 완화하며, 미디어와 유통 권력을 분산시켰다. 누구나 정보를 생산하고 배포할 수 있게 되자, 정보 독점에 의존하던 권위 구조가 약화되기 시작했다.\n\nAI는 이 연장선에 있다. 단, 이번에 확장되는 역량은 단순 노동이나 정보 접근이 아니라 판단과 추론이다. 이것이 이전 전환들과 결정적으로 다른 지점이다. 판단 능력은 지금까지 위계 구조의 핵심 정당성이었다. 전문가, 관리자, 의사결정자의 권위는 정보와 판단의 비대칭성에서 나왔다. 의사는 진단 능력으로, 변호사는 법률 해석 능력으로, 관리자는 종합적 판단 능력으로 권위를 유지해 왔다. AI는 그 비대칭을 해소하고 있다. 비대칭이 해소되면, 그 위에 서 있던 위계도 흔들린다.\n\n\n### 2장: 전환의 연쇄 — 다섯 단계\n\n개인 역량 확장이 사회 구조 전환으로 이어지는 과정에는 일정한 연쇄 구조가 존재한다. 이 연쇄의 순서를 정확히 이해하는 것이 중요하다. 순서를 건너뛰면 논의가 공회전한다.\n\n**1단계 — 개인 역량의 확장**\n\n기술이 특정 역량의 진입장벽을 낮춘다. 초기에는 소수의 얼리어답터가 해당 역량을 획득하지만, 기술의 확산과 함께 역량 보유자가 빠르게 늘어난다. AI의 경우, 전문적 판단과 분석 역량이 이 단계에 해당한다.\n\n10년 전 마케팅 전략을 수립하려면 데이터 분석가, 카피라이터, 시장조사 업체가 필요했다. 지금은 마케터 한 명이 AI 도구를 활용해 데이터 분석, 카피라이팅, 시장조사를 하루 안에 완성한다. 역할의 경계가 무너지고 있다. 한 사람을 위해 쓴 책이 30분 만에 나오고, 그 방식이 여러 사람에게 확장 가능하다. 이것은 생산성의 향상이 아니라 역량 구조의 변화다.\n\n**2단계 — 자유와 책임 범위의 확장**\n\n역량이 확장된 개인은 기존 위계 구조에서 이탈할 동인을 갖게 된다. 타인의 판단에 의존할 필요가 줄어들면서 더 큰 자율성을 요구하게 되고, 이와 동시에 그 자율성에 상응하는 책임도 수반된다. 이것은 자연스럽게 따라오는 귀결에 가깝다.\n\nAI를 활용해 팀장보다 정밀한 시장 분석을 완성한 팀원은 자연스럽게 묻는다. \"내가 직접 판단하고 실행하면 안 되는가?\" 이 질문은 단순한 불만이라기보다 역량이 확장된 개인이 필연적으로 도달하는 질문이다. 자유와 책임은 역량의 확장과 함께 이동한다. 역량이 이동했는데 권한이 이동하지 않으면, 그 간극이 마찰을 만든다.\n\n**3단계 — 공동체 질서의 재편**\n\n개인 역량의 광범위한 확장은 기존 위계 구조의 정당성 기반을 약화시킨다. 판단의 비대칭성에 근거했던 권위가 도전받으며, 공동체는 새로운 질서 원리를 필요로 하게 된다. 개인으로부터의 권한 위임 범위가 재협상되고, 공동체의 역할이 재정의된다.\n\n오픈소스 소프트웨어 생태계가 이미 이 구조를 보여준다. 리눅스는 전 세계 수천 명의 개발자가 위계 없이 기여하지만, 기여의 질에 따라 자연스럽게 권위가 형성된다. 직책이 지시해서가 아니라, 더 좋은 코드를 쓰는 사람이 더 많은 발언권을 갖는다. 이것은 위계의 소멸이 아니라 위계의 근거가 바뀌는 것이다.\n\n**4단계 — 경제 질서의 재형성**\n\n여기서부터가 핵심이다. AI가 효율성과 생산성 영역에서 인간을 대체함에 따라, 반복 가능한 작업의 경제적 가치는 하락한다. 많은 지적 노동이 빠르게 대체되거나 재조합될 수 있기 때문이다. 반면 AI가 대체하기 어려운 영역 — 관계, 신뢰, 돌봄, 맥락적 판단 — 의 상대적 가치는 상승한다.\n\n회계 법인의 주니어 직원이 하던 단순 재무 분석은 이미 AI가 대체하고 있다. 그러나 클라이언트의 불안을 듣고, 신뢰를 쌓고, 복잡한 맥락을 함께 해석하는 일은 여전히 사람이 한다. 가치가 이동하는 방향이 보인다. 반복 가능한 것에서 관계적인 것으로. 이 이동이 한 두 산업에서 일어나는 것이 아니라 경제 전반에서 동시에 일어난다는 점이 이번 전환의 규모다.\n\n이것은 단지 일자리 문제가 아니다. 개인의 경제적 가치가 시장에서 가격으로 결정되는 방식 자체가 흔들린다. 시장 가격만으로 인간의 기여를 측정하는 체계가 앞으로도 유지될 수 있는가. 이 질문이 경제 질서 전환의 출발점이다.\n\n**5단계 — 정치 질서의 재형성**\n\n경제 질서의 변화는 정치 질서의 변화로 이어진다. 역량과 정보를 갖춘 시민은 기존 대의 구조에서 더 직접적인 참여와 투명성을 요구한다. 국가 단위에서도 이 전환을 수용한 사회와 저항하는 사회 간 격차가 확대되며, 기존 국제 질서가 재편된다.\n\n\n### 3장: 개인과 공동체의 재정의\n\n개인은 공동체의 출발점이자 가장 기본이 되는 단위다. 개인은 본질적으로 안전과 건강을 최우선으로 추구하는 존재다. 이것은 단순한 생존 본능이 아니라, 모든 사회 설계의 출발점이 되어야 하는 원칙이다.\n\n공동체는 가정에서 시작해 이웃, 마을, 도시, 국가, 글로벌, 생태계로 확장되는 층위 구조를 가진다. 그러나 공동체는 고정된 실체가 아니다. 공동체는 가치와 이익을 공유하는 일종의 신념 체계이며, 개인들로부터 제한된 권한을 위임받아 공공 질서를 유지하는 역할을 수행한다. 핵심은 이 권한이 미션에 종속된다는 점이다. 공공 질서 유지라는 미션이 종료되면 권한도 사라져야 한다.\n\n그러나 산업화 시대를 거치면서, 공동체에 위임된 권한이 개인의 자유를 침해하는 수준으로 확장되었다. 국가는 개인의 동의 없이 징병하고, 세금을 부과하고, 이동을 통제했다. 이것은 원래의 위임 범위를 벗어난 것이다.\n\n역사적으로 개인이 공동체에 권한을 위임할 수밖에 없었던 이유는, 혼자서는 할 수 없는 일들이 너무 많았기 때문이다. 안보, 사법, 의료, 교육, 금융 — 이 모든 영역에서 개인은 집단적 인프라에 의존해야 했고, 그 의존성이 권한 위임의 근거였다. AI는 이 의존성을 체계적으로 해소하고 있다. 개인이 AI를 통해 전문적 판단과 분석 역량을 갖추게 되면, 기존에 공동체가 수행하던 역할의 상당 부분을 개인이 직접 수행할 수 있게 된다. 의존성의 구조가 바뀌면, 권한 위임의 구조도 바뀌어야 한다.\n\n정보화 사회에서 위임 구조는 아래로 내려온다. 개인과 가정, 이웃이 직접 처리하는 영역이 확대되고, 도시가 새로운 실험 단위가 되며, 국가는 국방과 외교, 재난에 집중하고, 세계는 AI와 기후처럼 국가 혼자 풀 수 없는 문제만 다룬다.\n\n그러나 이 변화에는 역설이 있다. AI가 효율성과 생산성의 상당 부분을 떠맡을수록, 인간의 삶에서 더 중요해지는 것은 관계, 신뢰, 돌봄, 소속, 상호 책임이다. 산업화는 개인을 시장의 단위로 강하게 밀어냈다. 개인은 노동력의 가격으로 환원됐고, 공동체는 시장 거래의 배경으로 후퇴했다. 그러나 AI는 역설적으로, 개인 혼자서는 감당할 수 없는 존재 조건을 다시 드러낸다. 인간은 끝내 관계 속에서 살아가고, 의미도 관계 속에서 얻는다.\n\nAI 이후의 질서에서 개인은 강화되지만, 공동체가 사라지는 것은 아니다. 오히려 공동체는 다른 근거 위에서 다시 중심에 들어온다. 강제와 의존이 아니라, 선택과 상호 필요에 의해서.\n\n\n### 4장: 경제 질서의 전환 — 왜 자본주의 이후를 묻는가\n\n지금의 자본주의는 개인이 시장에서 자신의 노동과 능력을 가격으로 교환하는 질서다. 각자의 몸값이 시장에서 결정되고, 생존 역시 그 가격 체계에 강하게 종속된다. 이 질서는 산업화 시대에 강력했다. 생산성과 효율을 끌어올리는 데 매우 효과적이었고, 개인의 동기 부여와 자원 배분 모두에서 다른 체제를 압도했다.\n\n그러나 AI는 이 질서의 전제를 흔든다. 많은 지적 노동이 빠르게 대체되거나 재조합될 수 있기 때문이다. 그 결과 개인의 경제적 가치가 지금과 같은 방식으로 계속 평가될 수 있는지 의문이 생긴다. 시장 가격만으로 인간의 기여를 측정하는 방식이 앞으로도 유지될 수 있는가. 인간이 무엇으로 가치를 인정받고, 어떤 관계 속에서 살아가며, 공동체가 무엇을 책임질 것인가. 이것이 경제 질서 질문의 출발점이다.\n\n이 질문은 단지 복지정책이나 기본소득의 문제가 아니다. 기본소득은 하나의 정책 수단일 뿐, 그것만으로는 질서 전환의 방향을 설명하지 못한다. 더 근본적인 질문은, AI 이후에 인간 노동의 의미가 어떻게 바뀌고, 가치의 원천이 어디로 이동하며, 그에 따라 분배와 협력의 원리가 어떻게 재구성되어야 하는가다.\n\n이 지점에서 칼 폴라니(Karl Polanyi)는 중요한 해석의 다리가 된다. 폴라니의 핵심 문제의식은 분명하다. 현재의 자본주의 시장경제는 인류 역사에서 자연스럽고 자생적인 질서가 아니라, 특정한 제도와 정치적 구성 위에 성립한 역사적 산물이라는 것이다.\n\n이 관점이 중요한 이유가 있다. 지금의 시장 질서가 자연 상태가 아니라면, 그 이후의 질서 역시 충분히 상상하고 설계할 수 있기 때문이다. 시장경제가 영원불변의 질서라는 전제 위에서는 AI가 초래하는 변화를 시장 내부의 조정 문제로만 볼 수밖에 없다. 일자리가 줄면 새 일자리를 만들면 되고, 소득이 줄면 재분배를 강화하면 된다는 식이다. 그러나 폴라니의 관점에서 보면, 시장경제 자체가 하나의 역사적 실험이었다. 그 실험이 새로운 조건 앞에서 한계를 드러낸다면, 다음 실험을 설계하는 것이 가능하고 또 필요하다.\n\n폴라니는 산업혁명 이후 시장이 사회로부터 '이탈'(disembedding)했다고 분석했다. 노동, 토지, 화폐가 허구적 상품(fictitious commodities)으로 시장에 편입되면서, 인간의 삶 자체가 시장 논리에 종속됐다. 그 결과 사회는 자기보호 운동(double movement)으로 대응했고, 그 충돌이 20세기의 정치적 격변을 만들었다. 파시즘, 공산주의, 뉴딜 — 이 모든 것이 시장의 과도한 이탈에 대한 사회의 반응이었다는 것이 폴라니의 해석이다.\n\nAI 시대에 이 분석은 새로운 의미를 갖는다. AI는 노동을 대체하는 것에 그치지 않는다. 판단과 추론까지 대체하면서, 인간이 시장에서 가격으로 교환할 수 있는 역량의 범위 자체를 축소시킨다. 폴라니가 말한 허구적 상품화의 논리가 한계에 도달하는 것이다. 인간의 노동이 더 이상 시장에서 안정적으로 가격화될 수 없다면, 시장을 중심으로 조직된 사회 전체의 작동 원리가 재검토 대상이 된다.\n\n우리가 폴라니를 다시 읽어야 하는 이유는 과거로 돌아가기 위해서가 아니다. 시장이 자연이 아니라 제도라는 점을 분명히 한 뒤, AI 시대의 새로운 제도적 질서를 사고하기 위해서다. 폴라니는 답을 주지 않는다. 그러나 질문의 방향을 바로잡아 준다. 자본주의 이후의 경제 질서는 발견하는 것이 아니라 설계하는 것이며, 그 설계는 시장을 넘어선 인간 관계와 공동체의 재구성 위에서 이루어져야 한다는 방향이다.\n\n\n### 5장: 두 가지 위험\n\n이 전환은 자동으로 평화롭게 진행되지 않는다. 역사는 두 가지 충돌 경로를 반복적으로 보여준다.\n\n**첫째, 내부 충돌이다.** 기존 위계 구조에서 이익을 얻는 집단은 전환에 저항할 강한 유인을 갖는다. 이 저항이 제도적으로 수용되지 못할 때, 사회는 혁명이나 내부 분열로 이행한다. 프랑스 혁명, 러시아 혁명, 20세기 전반부의 파시즘이 모두 이 경로의 역사적 사례다. 폴라니가 분석한 이중 운동 역시 이 경로의 한 형태다. 시장의 확장에 대해 사회가 자기보호로 대응하되, 그 대응이 극단적 형태를 취했을 때 파시즘이나 전체주의가 나타났다.\n\n**둘째, 국가 간 충돌이다.** 전환에 성공한 국가와 그렇지 못한 국가 사이의 역량 격차가 기존 국제 질서의 정당성을 무너뜨릴 때, 패권 경쟁이 격화된다. 산업화 시대의 두 차례 세계대전은 이 경로의 결과였다.\n\nAI 전환은 이 두 경로를 동시에 활성화할 가능성이 있다. 더구나 전환의 속도가 다르다. 증기기관은 수십 년에 걸쳐 확산됐다. AI는 수년 안에 사회 전반을 바꾸고 있다. 사회가 적응할 시간이 충분하지 않을 수 있다.\n\n위험을 선별하는 기준은 두 가지다. 첫째, 돌이킬 수 없는 공멸 또는 파국의 위험인가. AI가 발견한 시스템 취약점이 악용될 경우, 광범위한 인프라 공격이 가능해진다. 고성능 모델이 리눅스 체계의 심각한 취약점을 발견할 수 있을 정도로 강력하다면, 그 모델이 무방비 상태로 공개됐을 때의 결과는 예측하기 어렵다. 둘째, 공동체 해체와 사회적 분열의 심화인가. 경제적 가치의 급격한 재배치는 대규모 사회 불안을 야기할 수 있다. 이 두 기준에 해당하는 위험이 AI 전환의 핵심 관리 대상이다.\n\n\n### 6장: 기술 위험의 관리 — 사전 입증의 논리\n\n기술 위험에 대한 접근은 두 갈래로 나뉜다. 하나는 사후 대응이다. 문제가 발생한 후에 규제한다. 다른 하나는 사전 입증이다. 위험하지 않음을 먼저 입증한 후에만 공개를 허용한다.\n\n사후 대응은 전통적인 기술 규제의 방식이었다. 그러나 AI의 경우, 사후 대응이 충분하지 않을 수 있다. 한 번 공개된 모델은 회수할 수 없고, 그 모델이 야기하는 피해는 돌이킬 수 없는 규모에 달할 수 있기 때문이다.\n\n사전 입증 모델은 이미 작동하는 사례가 있다. 의약품의 FDA 승인 절차가 대표적이다. 기업은 자사 제품이 안전하다는 것을 스스로 입증해야 하며, 그 입증이 충분하지 않으면 시장에 내놓을 수 없다. AI에도 유사한 구조를 적용할 수 있다는 것이 이 논의의 핵심이다.\n\n실제로 일부 기업은 이미 자체적으로 이런 절차를 수행하고 있다. 고성능 AI 모델이 심각한 보안 취약점을 발견할 수 있을 정도의 능력을 갖추었을 때, 해당 기업은 모델의 공개를 보류하고 위험 검증을 수행했다. 민간 기업의 자율적 판단으로 이루어진 이 사례는, 사전 입증이 허황된 아이디어가 아니라 실제로 작동 가능한 접근이라는 점을 보여준다.\n\n그러나 모든 기업이 자발적으로 이런 절차를 따르리라는 보장은 없다. 경쟁 압력 속에서 안전 검증을 생략할 유인은 언제든 존재한다. 따라서 이 사전 입증 절차를 자율에 맡기지 않고 제도화하는 것이 과제다. Yoshua Bengio를 비롯한 국제 AI 안전 연구자들이 개발자 입증 책임을 주장해 온 것도 같은 맥락이다. 이 흐름은 이미 국제적 규범 형성의 방향으로 움직이고 있다.\n\n여기서 중요한 것은, 이 거버넌스 논의가 경제 질서에 대한 이해 위에 놓여야 한다는 점이다. 기술 통제만으로는 방향이 없다. 어떤 경제 질서를 지키기 위해, 어떤 사회적 가치를 보존하기 위해 기술을 관리하는 것인지가 분명해야 한다. 금지와 승인의 논리는 경제 질서의 전환이라는 맥락 속에서 비로소 설득력을 갖는다.\n\n\n### 7장: 우리가 목표하는 미래\n\n무정부 상태의 self-help 구조에서 벗어나는 것. 전쟁을 걱정하지 않아도 되는 삶, 전쟁을 대비하지 않아도 되는 삶. 이것은 단순한 평화주의가 아니다. 개인의 안전과 건강이 공동체에 대한 과도한 의존 없이도 보장되는 구조를 만드는 것이다.\n\n개인의 레벨에서는, 각자의 정체성 — 재능, 원하는 바 — 에 맞게 삶을 꾸릴 수 있는 구조다. 생존을 위해 자신의 정체성을 포기하지 않아도 되는 사회.\n\n이 두 가지는 별개가 아니다. 개인이 안전하게 자신의 삶을 살 수 있을 때, 공동체에 대한 과도한 권한 위임의 필요성도 줄어든다. 개인의 역량 확장이 단순히 생산성의 문제가 아닌 이유가 여기에 있다. 역량이 확장된 개인은 더 작은 의존으로 더 큰 자율을 실현할 수 있다. 그리고 그 자율적 개인들이 선택에 의해 모여든 공동체는, 강제에 의해 유지된 공동체보다 더 견고하다.\n\n\n### 8장: 왜 지금인가 — 설계가 앞서면 비용이 낮다\n\n역사적으로, 사전에 설계된 거버넌스는 작동했다. 화학무기금지협약(CWC)은 화학무기의 개발과 사용을 사전에 금지하는 데 성공했다. 몬트리올 의정서는 오존층 파괴 물질의 생산을 단계적으로 중단시켰다. 이 두 사례의 공통점은, 위험이 현실화되기 전에 국제적 합의가 이루어졌다는 점이다.\n\n반면 사후 봉합은 불완전했다. 핵비확산조약(NPT)은 핵무기가 이미 확산된 후에 만들어졌기 때문에 구조적 불평등을 내장했다. 생물무기금지협약(BWC)은 검증 메커니즘 없이 출발해 실효성에 한계가 있다.\n\nAI의 속도는 증기기관과 다르다. 증기기관의 사회적 확산에는 수십 년이 걸렸다. AI는 수년 안에 경제와 사회 전반에 스며들고 있다. 제도가 따라가지 못하는 속도다.\n\n지금이 마지막 창이다. 전환이 완성된 후 거버넌스를 설계하면 이미 늦다. 그리고 그 거버넌스를 설계하려면, 거버넌스가 지키고 조정해야 할 경제 질서의 방향이 먼저 정해져야 한다. 순서가 있다.\n\n\n### 9장: 태재가 하는 일\n\n기술의 방향을 바꾸는 것이 아니다. 전환이 전쟁이 아닌 진화로 끝날 수 있는 경로를 설계하는 것이다.\n\n이 작업은 다음 순서로 접근하는 편이 적절하다.\n\n첫째, 경제 질서의 전환에 대한 해석을 정립한다. 자본주의 이후의 질서에 관한 질문을 정확히 세우고, 폴라니를 비롯한 참조 사상가와 논의를 통해 역사적이고 이론적인 기반을 다진다. 이 논의를 AI가 만드는 개인 역량 확장과 연결해 우리 언어의 내러티브로 재구성한다.\n\n둘째, 그 해석 위에서 기술 위험의 관리 체계를 구체화한다. 사전 입증, 금지, 승인의 논리를 경제 질서 전환의 맥락 속에서 정당화하고, 국제적 규범 형성 흐름과의 접점을 만든다.\n\n셋째, 이론을 공론화하고 한국에서 실험한다. 한국은 AI 전환의 최전선에 있으면서도, 사회적 합의 형성의 전통이 있는 나라다. 패권의 최전선에서 합의의 최전선으로 이동하는 것이 한국이 택할 수 있는 경로다.\n\n이 과정에서 필요한 것은 완성된 솔루션을 급히 내놓는 것이 아니다. 변화의 논리를 정확히 해석하고, 그 해석을 함께 추론하는 과정이다. 결론으로 가는 사고의 전개 과정에 함께 참여하는 것. 그 과정 자체가 접점이 되고, 접점이 누적되어 합의가 된다.\n\n---\n\nnarrative v0.4.0 · 태재미래전략연구원 디지털팀 · 2026-04-13\n"}, {"version": "v0.4.0", "filename": "narrative-v0.4.0.md", "content": "# 개인의 시대\n\n## 개인 역량 확장이 초래하는 경제 질서의 전환, 그리고 그 이후의 공동체\n\n태재미래전략연구원 디지털팀 · narrative v0.4.0 · 2026\n\n---\n\n### 프롤로그: 순서를 다시 묻는다\n\n사회가 바뀔 때, 무엇이 먼저 바뀌는가.\n\n역사를 보면 답이 있다. 언제나 개인이 먼저 바뀌었다. 기술이 개인의 역량을 확장하면, 개인이 달라지고, 그 달라진 개인들 사이에서 새로운 경제 관계가 생겨나고, 공동체가 따라 달라졌다. 이 순서는 한 번도 바뀐 적이 없다.\n\n그런데 지금의 AI 논의는 이 순서를 건너뛴다. 기술의 성능과 위험을 말하고, 곧바로 규제와 거버넌스로 넘어간다. 경제 질서가 어떻게 바뀌는지, 개인과 공동체의 관계가 어떻게 달라지는지에 대한 해석 없이 제도를 말하면, 그 제도는 공중에 뜬다. 방향 없는 규제는 통제일 뿐이고, 근거 없는 금지는 반발만 부른다.\n\n지금 필요한 것은 솔루션의 나열이 아니다. 변화의 논리를 더 정확히 이해하는 일이다. 거버넌스는 그 이해 위에서 비로소 작동한다.\n\n\n### 1장: 역사의 패턴 — 개인이 먼저 바뀐다\n\n기술 혁신은 반복적으로 개인의 역량을 확장시켜 왔다. 그리고 매번 같은 순서로 세상이 바뀌었다.\n\n핵심 공식은 이렇다. 기술이 개인의 역량을 확장하면, 자유와 책임의 범위가 넓어지고, 공동체 질서가 재편되며, 경제 질서가 재형성되고, 마지막으로 정치 질서가 재형성된다.\n\n농업 기술은 식량 생산을 개인 및 소집단 단위로 가능하게 했다. 잉여가 생기면서 분업이 시작됐고, 분업은 계급을 만들었다. 인쇄술은 지식 접근의 비용을 급격히 낮춰 종교와 귀족 계층의 정보 독점을 해체했다. 지식이 확산되자 기존 권위의 정당성이 흔들렸고, 종교개혁과 계몽주의가 뒤따랐다. 산업 기계는 물적 생산 역량을 개인 자본에 개방하며 봉건적 생산 질서를 무너뜨렸다. 공장이 들어서면서 노동의 형태가 바뀌었고, 도시가 팽창했으며, 국가의 역할이 근본적으로 재정의됐다. 인터넷은 정보 유통의 비대칭성을 완화하며, 미디어와 유통 권력을 분산시켰다. 누구나 정보를 생산하고 배포할 수 있게 되자, 정보 독점에 의존하던 권위 구조가 약화되기 시작했다.\n\nAI는 이 연장선에 있다. 단, 이번에 확장되는 역량은 단순 노동이나 정보 접근이 아니라 판단과 추론이다. 이것이 이전 전환들과 결정적으로 다른 지점이다. 판단 능력은 지금까지 위계 구조의 핵심 정당성이었다. 전문가, 관리자, 의사결정자의 권위는 정보와 판단의 비대칭성에서 나왔다. 의사는 진단 능력으로, 변호사는 법률 해석 능력으로, 관리자는 종합적 판단 능력으로 권위를 유지해 왔다. AI는 그 비대칭을 해소하고 있다. 비대칭이 해소되면, 그 위에 서 있던 위계도 흔들린다.\n\n\n### 2장: 전환의 연쇄 — 다섯 단계\n\n개인 역량 확장이 사회 구조 전환으로 이어지는 과정에는 일정한 연쇄 구조가 존재한다. 이 연쇄의 순서를 정확히 이해하는 것이 중요하다. 순서를 건너뛰면 논의가 공회전한다.\n\n**1단계 — 개인 역량의 확장**\n\n기술이 특정 역량의 진입장벽을 낮춘다. 초기에는 소수의 얼리어답터가 해당 역량을 획득하지만, 기술의 확산과 함께 역량 보유자가 빠르게 늘어난다. AI의 경우, 전문적 판단과 분석 역량이 이 단계에 해당한다.\n\n10년 전 마케팅 전략을 수립하려면 데이터 분석가, 카피라이터, 시장조사 업체가 필요했다. 지금은 마케터 한 명이 AI 도구를 활용해 데이터 분석, 카피라이팅, 시장조사를 하루 안에 완성한다. 역할의 경계가 무너지고 있다. 한 사람을 위해 쓴 책이 30분 만에 나오고, 그 방식이 여러 사람에게 확장 가능하다. 이것은 생산성의 향상이 아니라 역량 구조의 변화다.\n\n**2단계 — 자유와 책임 범위의 확장**\n\n역량이 확장된 개인은 기존 위계 구조에서 이탈할 동인을 갖게 된다. 타인의 판단에 의존할 필요가 줄어들면서 더 큰 자율성을 요구하게 되고, 이와 동시에 그 자율성에 상응하는 책임도 수반된다. 이것은 욕망이 아니라 논리적 귀결이다.\n\nAI를 활용해 팀장보다 정밀한 시장 분석을 완성한 팀원은 자연스럽게 묻는다. \"내가 직접 판단하고 실행하면 안 되는가?\" 이것은 불만이 아니다. 역량이 확장된 개인이 필연적으로 도달하는 질문이다. 자유와 책임은 역량의 확장과 함께 이동한다. 역량이 이동했는데 권한이 이동하지 않으면, 그 간극이 마찰을 만든다.\n\n**3단계 — 공동체 질서의 재편**\n\n개인 역량의 광범위한 확장은 기존 위계 구조의 정당성 기반을 약화시킨다. 판단의 비대칭성에 근거했던 권위가 도전받으며, 공동체는 새로운 질서 원리를 필요로 하게 된다. 개인으로부터의 권한 위임 범위가 재협상되고, 공동체의 역할이 재정의된다.\n\n오픈소스 소프트웨어 생태계가 이미 이 구조를 보여준다. 리눅스는 전 세계 수천 명의 개발자가 위계 없이 기여하지만, 기여의 질에 따라 자연스럽게 권위가 형성된다. 직책이 지시해서가 아니라, 더 좋은 코드를 쓰는 사람이 더 많은 발언권을 갖는다. 이것은 위계의 소멸이 아니라 위계의 근거가 바뀌는 것이다.\n\n**4단계 — 경제 질서의 재형성**\n\n여기서부터가 핵심이다. AI가 효율성과 생산성 영역에서 인간을 대체함에 따라, 반복 가능한 작업의 경제적 가치는 하락한다. 많은 지적 노동이 빠르게 대체되거나 재조합될 수 있기 때문이다. 반면 AI가 대체하기 어려운 영역 — 관계, 신뢰, 돌봄, 맥락적 판단 — 의 상대적 가치는 상승한다.\n\n회계 법인의 주니어 직원이 하던 단순 재무 분석은 이미 AI가 대체하고 있다. 그러나 클라이언트의 불안을 듣고, 신뢰를 쌓고, 복잡한 맥락을 함께 해석하는 일은 여전히 사람이 한다. 가치가 이동하는 방향이 보인다. 반복 가능한 것에서 관계적인 것으로. 이 이동이 한 두 산업에서 일어나는 것이 아니라 경제 전반에서 동시에 일어난다는 점이 이번 전환의 규모다.\n\n이것은 단지 일자리 문제가 아니다. 개인의 경제적 가치가 시장에서 가격으로 결정되는 방식 자체가 흔들린다. 시장 가격만으로 인간의 기여를 측정하는 체계가 앞으로도 유지될 수 있는가. 이 질문이 경제 질서 전환의 출발점이다.\n\n**5단계 — 정치 질서의 재형성**\n\n경제 질서의 변화는 정치 질서의 변화로 이어진다. 역량과 정보를 갖춘 시민은 기존 대의 구조에서 더 직접적인 참여와 투명성을 요구한다. 국가 단위에서도 이 전환을 수용한 사회와 저항하는 사회 간 격차가 확대되며, 기존 국제 질서가 재편된다.\n\n\n### 3장: 개인과 공동체의 재정의\n\n개인은 공동체의 출발점이자 가장 기본이 되는 단위다. 개인은 본질적으로 안전과 건강을 최우선으로 추구하는 존재다. 이것은 단순한 생존 본능이 아니라, 모든 사회 설계의 출발점이 되어야 하는 원칙이다.\n\n공동체는 가정에서 시작해 이웃, 마을, 도시, 국가, 글로벌, 생태계로 확장되는 층위 구조를 가진다. 그러나 공동체는 고정된 실체가 아니다. 공동체는 가치와 이익을 공유하는 일종의 신념 체계이며, 개인들로부터 제한된 권한을 위임받아 공공 질서를 유지하는 역할을 수행한다. 핵심은 이 권한이 미션에 종속된다는 점이다. 공공 질서 유지라는 미션이 종료되면 권한도 사라져야 한다.\n\n그러나 산업화 시대를 거치면서, 공동체에 위임된 권한이 개인의 자유를 침해하는 수준으로 확장되었다. 국가는 개인의 동의 없이 징병하고, 세금을 부과하고, 이동을 통제했다. 이것은 원래의 위임 범위를 벗어난 것이다.\n\n역사적으로 개인이 공동체에 권한을 위임할 수밖에 없었던 이유는, 혼자서는 할 수 없는 일들이 너무 많았기 때문이다. 안보, 사법, 의료, 교육, 금융 — 이 모든 영역에서 개인은 집단적 인프라에 의존해야 했고, 그 의존성이 권한 위임의 근거였다. AI는 이 의존성을 체계적으로 해소하고 있다. 개인이 AI를 통해 전문적 판단과 분석 역량을 갖추게 되면, 기존에 공동체가 수행하던 역할의 상당 부분을 개인이 직접 수행할 수 있게 된다. 의존성의 구조가 바뀌면, 권한 위임의 구조도 바뀌어야 한다.\n\n정보화 사회에서 위임 구조는 아래로 내려온다. 개인과 가정, 이웃이 직접 처리하는 영역이 확대되고, 도시가 새로운 실험 단위가 되며, 국가는 국방과 외교, 재난에 집중하고, 세계는 AI와 기후처럼 국가 혼자 풀 수 없는 문제만 다룬다.\n\n그러나 이 변화에는 역설이 있다. AI가 효율성과 생산성의 상당 부분을 떠맡을수록, 인간의 삶에서 더 중요해지는 것은 관계, 신뢰, 돌봄, 소속, 상호 책임이다. 산업화는 개인을 시장의 단위로 강하게 밀어냈다. 개인은 노동력의 가격으로 환원됐고, 공동체는 시장 거래의 배경으로 후퇴했다. 그러나 AI는 역설적으로, 개인 혼자서는 감당할 수 없는 존재 조건을 다시 드러낸다. 인간은 끝내 관계 속에서 살아가고, 의미도 관계 속에서 얻는다.\n\nAI 이후의 질서에서 개인은 강화되지만, 공동체가 사라지는 것은 아니다. 오히려 공동체는 다른 근거 위에서 다시 중심에 들어온다. 강제와 의존이 아니라, 선택과 상호 필요에 의해서.\n\n\n### 4장: 경제 질서의 전환 — 왜 자본주의 이후를 묻는가\n\n지금의 자본주의는 개인이 시장에서 자신의 노동과 능력을 가격으로 교환하는 질서다. 각자의 몸값이 시장에서 결정되고, 생존 역시 그 가격 체계에 강하게 종속된다. 이 질서는 산업화 시대에 강력했다. 생산성과 효율을 끌어올리는 데 매우 효과적이었고, 개인의 동기 부여와 자원 배분 모두에서 다른 체제를 압도했다.\n\n그러나 AI는 이 질서의 전제를 흔든다. 많은 지적 노동이 빠르게 대체되거나 재조합될 수 있기 때문이다. 그 결과 개인의 경제적 가치가 지금과 같은 방식으로 계속 평가될 수 있는지 의문이 생긴다. 시장 가격만으로 인간의 기여를 측정하는 방식이 앞으로도 유지될 수 있는가. 인간이 무엇으로 가치를 인정받고, 어떤 관계 속에서 살아가며, 공동체가 무엇을 책임질 것인가. 이것이 경제 질서 질문의 출발점이다.\n\n이 질문은 단지 복지정책이나 기본소득의 문제가 아니다. 기본소득은 하나의 정책 수단일 뿐, 그것만으로는 질서 전환의 방향을 설명하지 못한다. 더 근본적인 질문은, AI 이후에 인간 노동의 의미가 어떻게 바뀌고, 가치의 원천이 어디로 이동하며, 그에 따라 분배와 협력의 원리가 어떻게 재구성되어야 하는가다.\n\n이 지점에서 칼 폴라니(Karl Polanyi)는 중요한 해석의 다리가 된다. 폴라니의 핵심 문제의식은 분명하다. 현재의 자본주의 시장경제는 인류 역사에서 자연스럽고 자생적인 질서가 아니라, 특정한 제도와 정치적 구성 위에 성립한 역사적 산물이라는 것이다.\n\n이 관점이 중요한 이유가 있다. 지금의 시장 질서가 자연 상태가 아니라면, 그 이후의 질서 역시 충분히 상상하고 설계할 수 있기 때문이다. 시장경제가 영원불변의 질서라는 전제 위에서는 AI가 초래하는 변화를 시장 내부의 조정 문제로만 볼 수밖에 없다. 일자리가 줄면 새 일자리를 만들면 되고, 소득이 줄면 재분배를 강화하면 된다는 식이다. 그러나 폴라니의 관점에서 보면, 시장경제 자체가 하나의 역사적 실험이었다. 그 실험이 새로운 조건 앞에서 한계를 드러낸다면, 다음 실험을 설계하는 것이 가능하고 또 필요하다.\n\n폴라니는 산업혁명 이후 시장이 사회로부터 '이탈'(disembedding)했다고 분석했다. 노동, 토지, 화폐가 허구적 상품(fictitious commodities)으로 시장에 편입되면서, 인간의 삶 자체가 시장 논리에 종속됐다. 그 결과 사회는 자기보호 운동(double movement)으로 대응했고, 그 충돌이 20세기의 정치적 격변을 만들었다. 파시즘, 공산주의, 뉴딜 — 이 모든 것이 시장의 과도한 이탈에 대한 사회의 반응이었다는 것이 폴라니의 해석이다.\n\nAI 시대에 이 분석은 새로운 의미를 갖는다. AI는 노동을 대체하는 것에 그치지 않는다. 판단과 추론까지 대체하면서, 인간이 시장에서 가격으로 교환할 수 있는 역량의 범위 자체를 축소시킨다. 폴라니가 말한 허구적 상품화의 논리가 한계에 도달하는 것이다. 인간의 노동이 더 이상 시장에서 안정적으로 가격화될 수 없다면, 시장을 중심으로 조직된 사회 전체의 작동 원리가 재검토 대상이 된다.\n\n우리가 폴라니를 다시 읽어야 하는 이유는 과거로 돌아가기 위해서가 아니다. 시장이 자연이 아니라 제도라는 점을 분명히 한 뒤, AI 시대의 새로운 제도적 질서를 사고하기 위해서다. 폴라니는 답을 주지 않는다. 그러나 질문의 방향을 바로잡아 준다. 자본주의 이후의 경제 질서는 발견하는 것이 아니라 설계하는 것이며, 그 설계는 시장을 넘어선 인간 관계와 공동체의 재구성 위에서 이루어져야 한다는 방향이다.\n\n\n### 5장: 두 가지 위험\n\n이 전환은 자동으로 평화롭게 진행되지 않는다. 역사는 두 가지 충돌 경로를 반복적으로 보여준다.\n\n**첫째, 내부 충돌이다.** 기존 위계 구조에서 이익을 얻는 집단은 전환에 저항할 강한 유인을 갖는다. 이 저항이 제도적으로 수용되지 못할 때, 사회는 혁명이나 내부 분열로 이행한다. 프랑스 혁명, 러시아 혁명, 20세기 전반부의 파시즘이 모두 이 경로의 역사적 사례다. 폴라니가 분석한 이중 운동 역시 이 경로의 한 형태다. 시장의 확장에 대해 사회가 자기보호로 대응하되, 그 대응이 극단적 형태를 취했을 때 파시즘이나 전체주의가 나타났다.\n\n**둘째, 국가 간 충돌이다.** 전환에 성공한 국가와 그렇지 못한 국가 사이의 역량 격차가 기존 국제 질서의 정당성을 무너뜨릴 때, 패권 경쟁이 격화된다. 산업화 시대의 두 차례 세계대전은 이 경로의 결과였다.\n\nAI 전환은 이 두 경로를 동시에 활성화할 가능성이 있다. 더구나 전환의 속도가 다르다. 증기기관은 수십 년에 걸쳐 확산됐다. AI는 수년 안에 사회 전반을 바꾸고 있다. 사회가 적응할 시간이 충분하지 않을 수 있다.\n\n위험을 선별하는 기준은 두 가지다. 첫째, 돌이킬 수 없는 공멸 또는 파국의 위험인가. AI가 발견한 시스템 취약점이 악용될 경우, 광범위한 인프라 공격이 가능해진다. 고성능 모델이 리눅스 체계의 심각한 취약점을 발견할 수 있을 정도로 강력하다면, 그 모델이 무방비 상태로 공개됐을 때의 결과는 예측하기 어렵다. 둘째, 공동체 해체와 사회적 분열의 심화인가. 경제적 가치의 급격한 재배치는 대규모 사회 불안을 야기할 수 있다. 이 두 기준에 해당하는 위험이 AI 전환의 핵심 관리 대상이다.\n\n\n### 6장: 기술 위험의 관리 — 사전 입증의 논리\n\n기술 위험에 대한 접근은 두 갈래로 나뉜다. 하나는 사후 대응이다. 문제가 발생한 후에 규제한다. 다른 하나는 사전 입증이다. 위험하지 않음을 먼저 입증한 후에만 공개를 허용한다.\n\n사후 대응은 전통적인 기술 규제의 방식이었다. 그러나 AI의 경우, 사후 대응이 충분하지 않을 수 있다. 한 번 공개된 모델은 회수할 수 없고, 그 모델이 야기하는 피해는 돌이킬 수 없는 규모에 달할 수 있기 때문이다.\n\n사전 입증 모델은 이미 작동하는 사례가 있다. 의약품의 FDA 승인 절차가 대표적이다. 기업은 자사 제품이 안전하다는 것을 스스로 입증해야 하며, 그 입증이 충분하지 않으면 시장에 내놓을 수 없다. AI에도 유사한 구조를 적용할 수 있다는 것이 이 논의의 핵심이다.\n\n실제로 일부 기업은 이미 자체적으로 이런 절차를 수행하고 있다. 고성능 AI 모델이 심각한 보안 취약점을 발견할 수 있을 정도의 능력을 갖추었을 때, 해당 기업은 모델의 공개를 보류하고 위험 검증을 수행했다. 민간 기업의 자율적 판단으로 이루어진 이 사례는, 사전 입증이 허황된 아이디어가 아니라 실제로 작동 가능한 접근이라는 점을 보여준다.\n\n그러나 모든 기업이 자발적으로 이런 절차를 따르리라는 보장은 없다. 경쟁 압력 속에서 안전 검증을 생략할 유인은 언제든 존재한다. 따라서 이 사전 입증 절차를 자율에 맡기지 않고 제도화하는 것이 과제다. Yoshua Bengio를 비롯한 국제 AI 안전 연구자들이 개발자 입증 책임을 주장해 온 것도 같은 맥락이다. 이 흐름은 이미 국제적 규범 형성의 방향으로 움직이고 있다.\n\n여기서 중요한 것은, 이 거버넌스 논의가 경제 질서에 대한 이해 위에 놓여야 한다는 점이다. 기술 통제만으로는 방향이 없다. 어떤 경제 질서를 지키기 위해, 어떤 사회적 가치를 보존하기 위해 기술을 관리하는 것인지가 분명해야 한다. 금지와 승인의 논리는 경제 질서의 전환이라는 맥락 속에서 비로소 설득력을 갖는다.\n\n\n### 7장: 우리가 목표하는 미래\n\n무정부 상태의 self-help 구조에서 벗어나는 것. 전쟁을 걱정하지 않아도 되는 삶, 전쟁을 대비하지 않아도 되는 삶. 이것은 단순한 평화주의가 아니다. 개인의 안전과 건강이 공동체에 대한 과도한 의존 없이도 보장되는 구조를 만드는 것이다.\n\n개인의 레벨에서는, 각자의 정체성 — 재능, 원하는 바 — 에 맞게 삶을 꾸릴 수 있는 구조다. 생존을 위해 자신의 정체성을 포기하지 않아도 되는 사회.\n\n이 두 가지는 별개가 아니다. 개인이 안전하게 자신의 삶을 살 수 있을 때, 공동체에 대한 과도한 권한 위임의 필요성도 줄어든다. 개인의 역량 확장이 단순히 생산성의 문제가 아닌 이유가 여기에 있다. 역량이 확장된 개인은 더 작은 의존으로 더 큰 자율을 실현할 수 있다. 그리고 그 자율적 개인들이 선택에 의해 모여든 공동체는, 강제에 의해 유지된 공동체보다 더 견고하다.\n\n\n### 8장: 왜 지금인가 — 설계가 앞서면 비용이 낮다\n\n역사적으로, 사전에 설계된 거버넌스는 작동했다. 화학무기금지협약(CWC)은 화학무기의 개발과 사용을 사전에 금지하는 데 성공했다. 몬트리올 의정서는 오존층 파괴 물질의 생산을 단계적으로 중단시켰다. 이 두 사례의 공통점은, 위험이 현실화되기 전에 국제적 합의가 이루어졌다는 점이다.\n\n반면 사후 봉합은 불완전했다. 핵비확산조약(NPT)은 핵무기가 이미 확산된 후에 만들어졌기 때문에 구조적 불평등을 내장했다. 생물무기금지협약(BWC)은 검증 메커니즘 없이 출발해 실효성에 한계가 있다.\n\nAI의 속도는 증기기관과 다르다. 증기기관의 사회적 확산에는 수십 년이 걸렸다. AI는 수년 안에 경제와 사회 전반에 스며들고 있다. 제도가 따라가지 못하는 속도다.\n\n지금이 마지막 창이다. 전환이 완성된 후 거버넌스를 설계하면 이미 늦다. 그리고 그 거버넌스를 설계하려면, 거버넌스가 지키고 조정해야 할 경제 질서의 방향이 먼저 정해져야 한다. 순서가 있다.\n\n\n### 9장: 태재가 하는 일\n\n기술의 방향을 바꾸는 것이 아니다. 전환이 전쟁이 아닌 진화로 끝날 수 있는 경로를 설계하는 것이다.\n\n이 작업의 순서는 분명하다.\n\n첫째, 경제 질서의 전환에 대한 해석을 정립한다. 자본주의 이후의 질서에 관한 질문을 정확히 세우고, 폴라니를 비롯한 참조 사상가와 논의를 통해 역사적이고 이론적인 기반을 다진다. 이 논의를 AI가 만드는 개인 역량 확장과 연결해 우리 언어의 내러티브로 재구성한다.\n\n둘째, 그 해석 위에서 기술 위험의 관리 체계를 구체화한다. 사전 입증, 금지, 승인의 논리를 경제 질서 전환의 맥락 속에서 정당화하고, 국제적 규범 형성 흐름과의 접점을 만든다.\n\n셋째, 이론을 공론화하고 한국에서 실험한다. 한국은 AI 전환의 최전선에 있으면서도, 사회적 합의 형성의 전통이 있는 나라다. 패권의 최전선에서 합의의 최전선으로 이동하는 것이 한국이 택할 수 있는 경로다.\n\n이 과정에서 필요한 것은 완성된 솔루션을 급히 내놓는 것이 아니다. 변화의 논리를 정확히 해석하고, 그 해석을 함께 추론하는 과정이다. 결론으로 가는 사고의 전개 과정에 함께 참여하는 것. 그 과정 자체가 접점이 되고, 접점이 누적되어 합의가 된다.\n\n---\n\nnarrative v0.4.0 · 태재미래전략연구원 디지털팀 · 2026-04-13\n"}, {"version": "v0.3.11", "filename": "narrative-v0.3.11.md", "content": "# 개인의 시대\n\n## 개인 역량 확장이 초래하는 경제 질서의 전환, 그리고 그 이후의 공동체\n\n태재미래전략연구원 디지털팀 · narrative v0.3.11 · 2026\n\n---\n\n### 프롤로그: 순서를 다시 묻는다\n\n사회가 바뀔 때, 무엇이 먼저 바뀌는가.\n\n역사를 보면 반복적으로 개인의 변화가 전환의 출발점이 되었다. 기술이 개인의 역량을 확장하면, 개인이 달라지고, 그 달라진 개인들 사이에서 새로운 경제 관계가 생겨나고, 공동체가 따라 달라졌다. 대체로 이런 순서로 전개되었다.\n\n그런데 지금의 AI 논의는 이 순서를 건너뛴다. 기술의 성능과 위험을 말하고, 곧바로 규제와 거버넌스로 넘어간다. 경제 질서가 어떻게 바뀌는지, 개인과 공동체의 관계가 어떻게 달라지는지에 대한 해석 없이 제도를 말하면, 그 제도는 공중에 뜬다. 방향 없는 규제는 통제일 뿐이고, 근거 없는 금지는 반발만 부른다.\n\n지금 필요한 것은 솔루션의 나열이 아니다. 변화의 논리를 더 정확히 이해하는 일이다. 거버넌스는 그 이해 위에서 비로소 작동한다.\n\n\n### 1장: 역사의 패턴 — 개인이 먼저 바뀐다\n\n기술 혁신은 반복적으로 개인의 역량을 확장시켜 왔다. 그리고 매번 같은 순서로 세상이 바뀌었다.\n\n핵심 공식은 이렇다. 기술이 개인의 역량을 확장하면, 자유와 책임의 범위가 넓어지고, 공동체 질서가 재편되며, 경제 질서가 재형성되고, 마지막으로 정치 질서가 재형성된다.\n\n농업 기술은 식량 생산을 개인 및 소집단 단위로 가능하게 했다. 잉여가 생기면서 분업이 시작됐고, 분업은 계급을 만들었다. 인쇄술은 지식 접근의 비용을 급격히 낮춰 종교와 귀족 계층의 정보 독점을 해체했다. 지식이 확산되자 기존 권위의 정당성이 흔들렸고, 종교개혁과 계몽주의가 뒤따랐다. 산업 기계는 물적 생산 역량을 개인 자본에 개방하며 봉건적 생산 질서를 무너뜨렸다. 공장이 들어서면서 노동의 형태가 바뀌었고, 도시가 팽창했으며, 국가의 역할이 근본적으로 재정의됐다. 인터넷은 정보 유통의 비대칭성을 완화하며, 미디어와 유통 권력을 분산시켰다. 누구나 정보를 생산하고 배포할 수 있게 되자, 정보 독점에 의존하던 권위 구조가 약화되기 시작했다.\n\nAI는 이 연장선에 있다. 단, 이번에 확장되는 역량은 단순 노동이나 정보 접근이 아니라 판단과 추론이다. 이것이 이전 전환들과 결정적으로 다른 지점이다. 판단 능력은 지금까지 위계 구조의 핵심 정당성이었다. 전문가, 관리자, 의사결정자의 권위는 정보와 판단의 비대칭성에서 나왔다. 의사는 진단 능력으로, 변호사는 법률 해석 능력으로, 관리자는 종합적 판단 능력으로 권위를 유지해 왔다. AI는 그 비대칭을 해소하고 있다. 비대칭이 해소되면, 그 위에 서 있던 위계도 흔들린다.\n\n\n### 2장: 전환의 연쇄 — 다섯 단계\n\n개인 역량 확장이 사회 구조 전환으로 이어지는 과정에는 일정한 연쇄 구조가 존재한다. 이 연쇄의 순서를 정확히 이해하는 것이 중요하다. 순서를 건너뛰면 논의가 공회전한다.\n\n**1단계 — 개인 역량의 확장**\n\n기술이 특정 역량의 진입장벽을 낮춘다. 초기에는 소수의 얼리어답터가 해당 역량을 획득하지만, 기술의 확산과 함께 역량 보유자가 빠르게 늘어난다. AI의 경우, 전문적 판단과 분석 역량이 이 단계에 해당한다.\n\n10년 전 마케팅 전략을 수립하려면 데이터 분석가, 카피라이터, 시장조사 업체가 필요했다. 지금은 마케터 한 명이 AI 도구를 활용해 데이터 분석, 카피라이팅, 시장조사를 하루 안에 완성한다. 역할의 경계가 무너지고 있다. 한 사람을 위해 쓴 책이 30분 만에 나오고, 그 방식이 여러 사람에게 확장 가능하다. 이것은 생산성의 향상이 아니라 역량 구조의 변화다.\n\n**2단계 — 자유와 책임 범위의 확장**\n\n역량이 확장된 개인은 기존 위계 구조에서 이탈할 동인을 갖게 된다. 타인의 판단에 의존할 필요가 줄어들면서 더 큰 자율성을 요구하게 되고, 이와 동시에 그 자율성에 상응하는 책임도 수반된다. 이것은 자연스럽게 따라오는 귀결에 가깝다.\n\nAI를 활용해 팀장보다 정밀한 시장 분석을 완성한 팀원은 자연스럽게 묻는다. \"내가 직접 판단하고 실행하면 안 되는가?\" 이 질문은 단순한 불만이라기보다 역량이 확장된 개인이 필연적으로 도달하는 질문이다. 자유와 책임은 역량의 확장과 함께 이동한다. 역량이 이동했는데 권한이 이동하지 않으면, 그 간극이 마찰을 만든다.\n\n**3단계 — 공동체 질서의 재편**\n\n개인 역량의 광범위한 확장은 기존 위계 구조의 정당성 기반을 약화시킨다. 판단의 비대칭성에 근거했던 권위가 도전받으며, 공동체는 새로운 질서 원리를 필요로 하게 된다. 개인으로부터의 권한 위임 범위가 재협상되고, 공동체의 역할이 재정의된다.\n\n오픈소스 소프트웨어 생태계가 이미 이 구조를 보여준다. 리눅스는 전 세계 수천 명의 개발자가 위계 없이 기여하지만, 기여의 질에 따라 자연스럽게 권위가 형성된다. 직책이 지시해서가 아니라, 더 좋은 코드를 쓰는 사람이 더 많은 발언권을 갖는다. 이것은 위계의 소멸이 아니라 위계의 근거가 바뀌는 것이다.\n\n**4단계 — 경제 질서의 재형성**\n\n여기서부터가 핵심이다. AI가 효율성과 생산성 영역에서 인간을 대체함에 따라, 반복 가능한 작업의 경제적 가치는 하락한다. 많은 지적 노동이 빠르게 대체되거나 재조합될 수 있기 때문이다. 반면 AI가 대체하기 어려운 영역 — 관계, 신뢰, 돌봄, 맥락적 판단 — 의 상대적 가치는 상승한다.\n\n회계 법인의 주니어 직원이 하던 단순 재무 분석은 이미 AI가 대체하고 있다. 그러나 클라이언트의 불안을 듣고, 신뢰를 쌓고, 복잡한 맥락을 함께 해석하는 일은 여전히 사람이 한다. 가치가 이동하는 방향이 보인다. 반복 가능한 것에서 관계적인 것으로. 이 이동이 한 두 산업에서 일어나는 것이 아니라 경제 전반에서 동시에 일어난다는 점이 이번 전환의 규모다.\n\n이것은 단지 일자리 문제가 아니다. 개인의 경제적 가치가 시장에서 가격으로 결정되는 방식 자체가 흔들린다. 시장 가격만으로 인간의 기여를 측정하는 체계가 앞으로도 유지될 수 있는가. 이 질문이 경제 질서 전환의 출발점이다.\n\n**5단계 — 정치 질서의 재형성**\n\n경제 질서의 변화는 정치 질서의 변화로 이어진다. 역량과 정보를 갖춘 시민은 기존 대의 구조에서 더 직접적인 참여와 투명성을 요구한다. 국가 단위에서도 이 전환을 수용한 사회와 저항하는 사회 간 격차가 확대되며, 기존 국제 질서가 재편된다.\n\n\n### 3장: 개인과 공동체의 재정의\n\n개인은 공동체의 출발점이자 가장 기본이 되는 단위다. 개인은 본질적으로 안전과 건강을 최우선으로 추구하는 존재다. 이것은 단순한 생존 본능이 아니라, 모든 사회 설계의 출발점이 되어야 하는 원칙이다.\n\n공동체는 가정에서 시작해 이웃, 마을, 도시, 국가, 글로벌, 생태계로 확장되는 층위 구조를 가진다. 그러나 공동체는 고정된 실체가 아니다. 공동체는 가치와 이익을 공유하는 일종의 신념 체계이며, 개인들로부터 제한된 권한을 위임받아 공공 질서를 유지하는 역할을 수행한다. 핵심은 이 권한이 미션에 종속된다는 점이다. 공공 질서 유지라는 미션이 종료되면 권한도 사라져야 한다.\n\n그러나 산업화 시대를 거치면서, 공동체에 위임된 권한이 개인의 자유를 침해하는 수준으로 확장되었다. 국가는 개인의 동의 없이 징병하고, 세금을 부과하고, 이동을 통제했다. 이것은 원래의 위임 범위를 벗어난 것이다.\n\n역사적으로 개인이 공동체에 권한을 위임할 수밖에 없었던 이유는, 혼자서는 할 수 없는 일들이 너무 많았기 때문이다. 안보, 사법, 의료, 교육, 금융 — 이 모든 영역에서 개인은 집단적 인프라에 의존해야 했고, 그 의존성이 권한 위임의 근거였다. AI는 이 의존성을 체계적으로 해소하고 있다. 개인이 AI를 통해 전문적 판단과 분석 역량을 갖추게 되면, 기존에 공동체가 수행하던 역할의 상당 부분을 개인이 직접 수행할 수 있게 된다. 의존성의 구조가 바뀌면, 권한 위임의 구조도 바뀌어야 한다.\n\n정보화 사회에서 위임 구조는 아래로 내려온다. 개인과 가정, 이웃이 직접 처리하는 영역이 확대되고, 도시가 새로운 실험 단위가 되며, 국가는 국방과 외교, 재난에 집중하고, 세계는 AI와 기후처럼 국가 혼자 풀 수 없는 문제만 다룬다.\n\n그러나 이 변화에는 역설이 있다. AI가 효율성과 생산성의 상당 부분을 떠맡을수록, 인간의 삶에서 더 중요해지는 것은 관계, 신뢰, 돌봄, 소속, 상호 책임이다. 산업화는 개인을 시장의 단위로 강하게 밀어냈다. 개인은 노동력의 가격으로 환원됐고, 공동체는 시장 거래의 배경으로 후퇴했다. 그러나 AI는 역설적으로, 개인 혼자서는 감당할 수 없는 존재 조건을 다시 드러낸다. 인간은 끝내 관계 속에서 살아가고, 의미도 관계 속에서 얻는다.\n\nAI 이후의 질서에서 개인은 강화되지만, 공동체가 사라지는 것은 아니다. 오히려 공동체는 다른 근거 위에서 다시 중심에 들어온다. 강제와 의존이 아니라, 선택과 상호 필요에 의해서.\n\n\n### 4장: 경제 질서의 전환 — 왜 자본주의 이후를 묻는가\n\n지금의 자본주의는 개인이 시장에서 자신의 노동과 능력을 가격으로 교환하는 질서다. 각자의 몸값이 시장에서 결정되고, 생존 역시 그 가격 체계에 강하게 종속된다. 이 질서는 산업화 시대에 강력했다. 생산성과 효율을 끌어올리는 데 매우 효과적이었고, 개인의 동기 부여와 자원 배분 모두에서 다른 체제를 압도했다.\n\n그러나 AI는 이 질서의 전제를 흔든다. 많은 지적 노동이 빠르게 대체되거나 재조합될 수 있기 때문이다. 그 결과 개인의 경제적 가치가 지금과 같은 방식으로 계속 평가될 수 있는지 의문이 생긴다. 시장 가격만으로 인간의 기여를 측정하는 방식이 앞으로도 유지될 수 있는가. 인간이 무엇으로 가치를 인정받고, 어떤 관계 속에서 살아가며, 공동체가 무엇을 책임질 것인가. 이것이 경제 질서 질문의 출발점이다.\n\n이 질문은 단지 복지정책이나 기본소득의 문제가 아니다. 기본소득은 하나의 정책 수단일 뿐, 그것만으로는 질서 전환의 방향을 설명하지 못한다. 더 근본적인 질문은, AI 이후에 인간 노동의 의미가 어떻게 바뀌고, 가치의 원천이 어디로 이동하며, 그에 따라 분배와 협력의 원리가 어떻게 재구성되어야 하는가다.\n\n이 지점에서 칼 폴라니(Karl Polanyi)는 중요한 해석의 다리가 된다. 폴라니의 핵심 문제의식은 분명하다. 현재의 자본주의 시장경제는 인류 역사에서 자연스럽고 자생적인 질서가 아니라, 특정한 제도와 정치적 구성 위에 성립한 역사적 산물이라는 것이다.\n\n이 관점이 중요한 이유가 있다. 지금의 시장 질서가 자연 상태가 아니라면, 그 이후의 질서 역시 충분히 상상하고 설계할 수 있기 때문이다. 시장경제가 영원불변의 질서라는 전제 위에서는 AI가 초래하는 변화를 시장 내부의 조정 문제로만 볼 수밖에 없다. 일자리가 줄면 새 일자리를 만들면 되고, 소득이 줄면 재분배를 강화하면 된다는 식이다. 그러나 폴라니의 관점에서 보면, 시장경제 자체가 하나의 역사적 실험이었다. 그 실험이 새로운 조건 앞에서 한계를 드러낸다면, 다음 실험을 설계하는 것이 가능하고 또 필요하다.\n\n폴라니는 산업혁명 이후 시장이 사회로부터 '이탈'(disembedding)했다고 분석했다. 노동, 토지, 화폐가 허구적 상품(fictitious commodities)으로 시장에 편입되면서, 인간의 삶 자체가 시장 논리에 종속됐다. 그 결과 사회는 자기보호 운동(double movement)으로 대응했고, 그 충돌이 20세기의 정치적 격변을 만들었다. 파시즘, 공산주의, 뉴딜 — 이 모든 것이 시장의 과도한 이탈에 대한 사회의 반응이었다는 것이 폴라니의 해석이다.\n\nAI 시대에 이 분석은 새로운 의미를 갖는다. AI는 노동을 대체하는 것에 그치지 않는다. 판단과 추론까지 대체하면서, 인간이 시장에서 가격으로 교환할 수 있는 역량의 범위 자체를 축소시킨다. 폴라니가 말한 허구적 상품화의 논리가 한계에 도달하는 것이다. 인간의 노동이 더 이상 시장에서 안정적으로 가격화될 수 없다면, 시장을 중심으로 조직된 사회 전체의 작동 원리가 재검토 대상이 된다.\n\n우리가 폴라니를 다시 읽어야 하는 이유는 과거로 돌아가기 위해서가 아니다. 시장이 자연이 아니라 제도라는 점을 분명히 한 뒤, AI 시대의 새로운 제도적 질서를 사고하기 위해서다. 폴라니는 답을 주지 않는다. 그러나 질문의 방향을 바로잡아 준다. 자본주의 이후의 경제 질서는 발견하는 것이 아니라 설계하는 것이며, 그 설계는 시장을 넘어선 인간 관계와 공동체의 재구성 위에서 이루어져야 한다는 방향이다.\n\n\n### 5장: 두 가지 위험\n\n이 전환은 자동으로 평화롭게 진행되지 않는다. 역사는 두 가지 충돌 경로를 반복적으로 보여준다.\n\n**첫째, 내부 충돌이다.** 기존 위계 구조에서 이익을 얻는 집단은 전환에 저항할 강한 유인을 갖는다. 이 저항이 제도적으로 수용되지 못할 때, 사회는 혁명이나 내부 분열로 이행한다. 프랑스 혁명, 러시아 혁명, 20세기 전반부의 파시즘이 모두 이 경로의 역사적 사례다. 폴라니가 분석한 이중 운동 역시 이 경로의 한 형태다. 시장의 확장에 대해 사회가 자기보호로 대응하되, 그 대응이 극단적 형태를 취했을 때 파시즘이나 전체주의가 나타났다.\n\n**둘째, 국가 간 충돌이다.** 전환에 성공한 국가와 그렇지 못한 국가 사이의 역량 격차가 기존 국제 질서의 정당성을 무너뜨릴 때, 패권 경쟁이 격화된다. 산업화 시대의 두 차례 세계대전은 이 경로의 결과였다.\n\nAI 전환은 이 두 경로를 동시에 활성화할 가능성이 있다. 더구나 전환의 속도가 다르다. 증기기관은 수십 년에 걸쳐 확산됐다. AI는 수년 안에 사회 전반을 바꾸고 있다. 사회가 적응할 시간이 충분하지 않을 수 있다.\n\n위험을 선별하는 기준은 두 가지다. 첫째, 돌이킬 수 없는 공멸 또는 파국의 위험인가. AI가 발견한 시스템 취약점이 악용될 경우, 광범위한 인프라 공격이 가능해진다. 고성능 모델이 리눅스 체계의 심각한 취약점을 발견할 수 있을 정도로 강력하다면, 그 모델이 무방비 상태로 공개됐을 때의 결과는 예측하기 어렵다. 둘째, 공동체 해체와 사회적 분열의 심화인가. 경제적 가치의 급격한 재배치는 대규모 사회 불안을 야기할 수 있다. 이 두 기준에 해당하는 위험이 AI 전환의 핵심 관리 대상이다.\n\n\n### 6장: 기술 위험의 관리 — 사전 입증의 논리\n\n기술 위험에 대한 접근은 두 갈래로 나뉜다. 하나는 사후 대응이다. 문제가 발생한 후에 규제한다. 다른 하나는 사전 입증이다. 위험하지 않음을 먼저 입증한 후에만 공개를 허용한다.\n\n사후 대응은 전통적인 기술 규제의 방식이었다. 그러나 AI의 경우, 사후 대응이 충분하지 않을 수 있다. 한 번 공개된 모델은 회수할 수 없고, 그 모델이 야기하는 피해는 돌이킬 수 없는 규모에 달할 수 있기 때문이다.\n\n사전 입증 모델은 이미 작동하는 사례가 있다. 의약품의 FDA 승인 절차가 대표적이다. 기업은 자사 제품이 안전하다는 것을 스스로 입증해야 하며, 그 입증이 충분하지 않으면 시장에 내놓을 수 없다. AI에도 유사한 구조를 적용할 수 있다는 것이 이 논의의 핵심이다.\n\n실제로 일부 기업은 이미 자체적으로 이런 절차를 수행하고 있다. 고성능 AI 모델이 심각한 보안 취약점을 발견할 수 있을 정도의 능력을 갖추었을 때, 해당 기업은 모델의 공개를 보류하고 위험 검증을 수행했다. 민간 기업의 자율적 판단으로 이루어진 이 사례는, 사전 입증이 허황된 아이디어가 아니라 실제로 작동 가능한 접근이라는 점을 보여준다.\n\n그러나 모든 기업이 자발적으로 이런 절차를 따르리라는 보장은 없다. 경쟁 압력 속에서 안전 검증을 생략할 유인은 언제든 존재한다. 따라서 이 사전 입증 절차를 자율에 맡기지 않고 제도화하는 것이 과제다. Yoshua Bengio를 비롯한 국제 AI 안전 연구자들이 개발자 입증 책임을 주장해 온 것도 같은 맥락이다. 이 흐름은 이미 국제적 규범 형성의 방향으로 움직이고 있다.\n\n여기서 중요한 것은, 이 거버넌스 논의가 경제 질서에 대한 이해 위에 놓여야 한다는 점이다. 기술 통제만으로는 방향이 없다. 어떤 경제 질서를 지키기 위해, 어떤 사회적 가치를 보존하기 위해 기술을 관리하는 것인지가 분명해야 한다. 금지와 승인의 논리는 경제 질서의 전환이라는 맥락 속에서 비로소 설득력을 갖는다.\n\n\n### 7장: 우리가 목표하는 미래\n\n무정부 상태의 self-help 구조에서 벗어나는 것. 전쟁을 걱정하지 않아도 되는 삶, 전쟁을 대비하지 않아도 되는 삶. 이것은 단순한 평화주의가 아니다. 개인의 안전과 건강이 공동체에 대한 과도한 의존 없이도 보장되는 구조를 만드는 것이다.\n\n개인의 레벨에서는, 각자의 정체성 — 재능, 원하는 바 — 에 맞게 삶을 꾸릴 수 있는 구조다. 생존을 위해 자신의 정체성을 포기하지 않아도 되는 사회.\n\n이 두 가지는 별개가 아니다. 개인이 안전하게 자신의 삶을 살 수 있을 때, 공동체에 대한 과도한 권한 위임의 필요성도 줄어든다. 개인의 역량 확장이 단순히 생산성의 문제가 아닌 이유가 여기에 있다. 역량이 확장된 개인은 더 작은 의존으로 더 큰 자율을 실현할 수 있다. 그리고 그 자율적 개인들이 선택에 의해 모여든 공동체는, 강제에 의해 유지된 공동체보다 더 견고하다.\n\n\n### 8장: 왜 지금인가 — 설계가 앞서면 비용이 낮다\n\n역사적으로, 사전에 설계된 거버넌스는 작동했다. 화학무기금지협약(CWC)은 화학무기의 개발과 사용을 사전에 금지하는 데 성공했다. 몬트리올 의정서는 오존층 파괴 물질의 생산을 단계적으로 중단시켰다. 이 두 사례의 공통점은, 위험이 현실화되기 전에 국제적 합의가 이루어졌다는 점이다.\n\n반면 사후 봉합은 불완전했다. 핵비확산조약(NPT)은 핵무기가 이미 확산된 후에 만들어졌기 때문에 구조적 불평등을 내장했다. 생물무기금지협약(BWC)은 검증 메커니즘 없이 출발해 실효성에 한계가 있다.\n\nAI의 속도는 증기기관과 다르다. 증기기관의 사회적 확산에는 수십 년이 걸렸다. AI는 수년 안에 경제와 사회 전반에 스며들고 있다. 제도가 따라가지 못하는 속도다.\n\n지금이 마지막 창이다. 전환이 완성된 후 거버넌스를 설계하면 이미 늦다. 그리고 그 거버넌스를 설계하려면, 거버넌스가 지키고 조정해야 할 경제 질서의 방향이 먼저 정해져야 한다. 순서가 있다.\n\n\n### 9장: 태재가 하는 일\n\n기술의 방향을 바꾸는 것이 아니다. 전환이 전쟁이 아닌 진화로 끝날 수 있는 경로를 설계하는 것이다.\n\n이 작업은 다음 순서로 접근하는 편이 적절하다.\n\n첫째, 경제 질서의 전환에 대한 해석을 정립한다. 자본주의 이후의 질서에 관한 질문을 정확히 세우고, 폴라니를 비롯한 참조 사상가와 논의를 통해 역사적이고 이론적인 기반을 다진다. 이 논의를 AI가 만드는 개인 역량 확장과 연결해 우리 언어의 내러티브로 재구성한다.\n\n둘째, 그 해석 위에서 기술 위험의 관리 체계를 구체화한다. 사전 입증, 금지, 승인의 논리를 경제 질서 전환의 맥락 속에서 정당화하고, 국제적 규범 형성 흐름과의 접점을 만든다.\n\n셋째, 이론을 공론화하고 한국에서 실험한다. 한국은 AI 전환의 최전선에 있으면서도, 사회적 합의 형성의 전통이 있는 나라다. 패권의 최전선에서 합의의 최전선으로 이동하는 것이 한국이 택할 수 있는 경로다.\n\n이 과정에서 필요한 것은 완성된 솔루션을 급히 내놓는 것이 아니다. 변화의 논리를 정확히 해석하고, 그 해석을 함께 추론하는 과정이다. 결론으로 가는 사고의 전개 과정에 함께 참여하는 것. 그 과정 자체가 접점이 되고, 접점이 누적되어 합의가 된다.\n\n---\n\nnarrative v0.3.11 · 태재미래전략연구원 디지털팀 · 2026-04-13\n"}, {"version": "v0.3.10", "filename": "narrative-v0.3.10.md", "content": "# 개인의 시대\n\n**개인 역량 확장이 초래하는 사회 구조 전환**\n\n태재미래전략연구원 디지털팀 · narrative v0.3.10 · 2026\n\n\n---\n\n## 프롤로그: 질문\n\n사회가 바뀔 때, 무엇이 먼저 바뀌는가?\n\n역사를 보면 답이 있다. 언제나 개인이 먼저 바뀌었다. 기술이 개인의 역량을 확장하면, 개인이 달라지고, 개인과 개인 사이의 관계가 달라지고, 그 관계가 모여 만든 공동체의 질서가 달라졌다. 경제 질서가 바뀌고, 정치 질서가 바뀌고, 마지막으로 그 질서를 명문화하는 제도와 거버넌스가 뒤따랐다. 이 순서는 한 번도 바뀐 적이 없다.\n\n이 글은 그 순서를 따른다. 디지털 기술이 개인을 어떻게 바꾸는지부터 출발하여, 개인과 공동체의 관계가 어떻게 재편되는지를 거치고, 경제 질서의 변동을 경유하여, 사회 질서 전반의 전환에 도달하고, 그 전환이 초래하는 위험을 직시한 뒤, 비로소 거버넌스의 질문에 이른다. 결론을 먼저 말하는 것이 아니라, 결론에 이르는 사고의 경로를 함께 걷는 것이 이 글의 목적이다.\n\n\n---\n\n## 1장: 역사의 패턴 — 개인이 먼저 바뀐다\n\n기술 혁신은 반복적으로 개인의 역량을 확장시켜 왔다. 그리고 매번 같은 순서로 세상이 바뀌었다.\n\n**핵심 공식:**\n기술 → 개인 역량 확장 → 자유·책임 범위 확장 → 공동체 질서 재편 → 경제 질서 재형성 → 정치 질서 재형성\n\n농업 기술은 식량 생산을 개인 단위로 가능하게 했다. 잉여가 생기자 축적이 시작되었고, 축적은 분업을, 분업은 계급을 만들었다. 수렵-채집 시대의 평등한 무리가 계층화된 촌락으로 바뀐 것은 도덕적 선택이 아니라 역량 확장의 구조적 귀결이었다.\n\n인쇄술은 지식 접근의 비용을 극적으로 낮추었다. 성경이 라틴어 독점에서 풀려나자 종교적 권위가 흔들렸고, 지식이 대학 밖으로 퍼지자 귀족의 정보 독점이 해체되었다. 루터의 95개 조항은 인쇄기 없이는 비텐베르크 교회 문 앞에서 끝났을 것이다. 개인이 직접 텍스트를 읽고 판단할 수 있게 된 순간, 중세의 위계 구조는 정당성을 잃기 시작했다.\n\n산업 기계는 물적 생산을 개인 자본에 개방했다. 봉건 영주의 토지가 아니라 공장주의 기계가 부의 원천이 되면서, 경제 질서가 먼저 바뀌었고 정치 질서가 뒤따랐다. 영국에서 선거권이 점진적으로 확대된 것은 산업 자본가와 노동자가 기존 정치 질서 안에서 목소리를 내기 시작했기 때문이다. 경제적 역량의 확장이 정치적 권리의 확장에 선행했다.\n\n인터넷은 정보 유통의 비대칭성을 완화했다. 언론사, 출판사, 방송국이 독점했던 정보 채널이 개방되면서, 개인은 수용자에서 생산자로 전환되었다. 아랍의 봄에서 소셜 미디어가 한 역할은 인쇄술이 종교개혁에서 한 역할의 디지털판이었다.\n\nAI는 이 연장선에 있다. 단, 이번에 확장되는 역량은 판단과 추론이다. 이 점이 결정적으로 다르다. 이전의 기술들이 확장한 것은 신체적 노동력, 정보 접근성, 소통 범위였다. 판단 능력은 건드리지 못했다. 판단은 지금까지 모든 위계 구조의 핵심 정당성이었다. 전문가의 권위, 관리자의 존재 이유, 의사결정자의 지위 — 이 모든 것은 정보와 판단의 비대칭성 위에 세워져 있었다. AI는 바로 그 비대칭을 해소하고 있다.\n\n그러나 현재의 AI 논의 대부분은 이 순서를 건너뛴다. 기술이 개인을 어떻게 바꾸는지, 바뀐 개인이 공동체와의 관계를 어떻게 재협상하는지, 그 재협상이 경제 질서를 어떻게 변형시키는지를 묻지 않고, 곧바로 \"AI를 어떻게 규제할 것인가\"로 직행한다. 경제 질서의 해석 없이 거버넌스를 논하면, 그 거버넌스는 공중에 뜬다. 무엇을 왜 규제해야 하는지에 대한 합의 없이 만들어진 제도는 현실을 반영하지 못한다.\n\n\n---\n\n## 2장: 개인의 변화 — 삶, 역량, 생애주기\n\n이 전환의 출발점은 거시적 질서가 아니라 한 사람의 삶이다. AI가 개인의 일상을 어떻게 바꾸는지를 먼저 이해하지 않으면, 그 이후의 모든 분석은 추상에 머문다.\n\n**역량의 변화.** 마케터 한 명이 AI로 데이터 분석, 카피 작성, 시장 조사를 하루 만에 완성한다. 10년 전이라면 데이터 분석가, 카피라이터, 리서처 세 명이 일주일 걸릴 작업이다. 신입 변호사가 AI로 판례를 검토하면, 5년 차 선배가 이틀 걸려 할 작업을 반나절에 끝낸다. 의대생이 AI의 도움으로 영상 판독 훈련을 받으면, 전공의 수련 기간에 축적할 경험을 학부 과정에서 확보할 수 있다. 이것은 단순한 효율 향상이 아니다. 진입장벽의 구조적 하락이다. 특정 역량에 도달하기 위해 필요했던 시간, 비용, 제도적 경로가 근본적으로 짧아지고 있다.\n\n**자율성의 변화.** 역량이 확장된 개인은 더 큰 자율성을 요구하게 된다. 이것은 욕망이 아니라 논리적 귀결이다. AI로 팀장보다 정밀한 분석을 완성한 팀원은 자연스럽게 묻는다 — \"내가 직접 판단하면 안 되는가?\" 이것은 불만이 아니다. 역량이 확장된 개인이 필연적으로 도달하는 질문이다. 자율성이 확대되면 그에 상응하는 책임도 따라온다. 판단의 권한이 개인에게 이동하면, 판단의 결과에 대한 책무도 개인에게 이동한다. 자유와 책임은 분리할 수 없다.\n\n**삶의 구조 변화.** AI는 개인의 역량만이 아니라 삶의 구조 자체를 바꾼다. 산업화 시대의 삶은 교육-노동-은퇴라는 3단계 생애주기로 설계되어 있었다. 20대까지 배우고, 60대까지 일하고, 이후에 쉰다. 이 구조는 노동 시장의 요구에 최적화된 것이었다. 공장은 표준화된 기술을 가진 노동력을 필요로 했고, 교육 체계는 그것을 공급하기 위해 설계되었다.\n\nAI 시대에 이 구조는 유지되기 어렵다. 특정 기술의 유효 기간이 극적으로 단축되기 때문이다. 10년간 축적한 전문성이 AI 모델 하나의 등장으로 범용화되는 환경에서, 한 번의 교육으로 40년을 버티는 생애주기 모델은 작동하지 않는다. 대신 학습과 노동과 재학습이 반복적으로 순환하는 구조가 된다. 50대에 새로운 분야를 학습하고, 30대에 안식기를 갖고, 70대에 경험 기반의 판단 역할로 복귀하는 것이 비정상이 아니라 합리적 선택이 되는 시대다.\n\n**건강과 수명의 변화.** AI 기반 의료 진단, 맞춤형 치료, 유전체 분석의 발전은 개인이 자신의 건강을 관리하는 역량을 확장한다. 의사에게 전적으로 위임했던 건강 판단의 상당 부분이 개인에게 돌아온다. 동시에 평균 수명의 연장은 생애주기 재설계를 더욱 불가피하게 만든다. 100세 시대에 20대에 내린 직업 선택이 80년을 규정하는 것은 구조적으로 불합리하다.\n\n**정체성의 변화.** 산업화 시대에 개인의 정체성은 직업과 강하게 결합되어 있었다. \"무슨 일 하세요?\"라는 질문이 곧 \"당신은 누구입니까?\"의 대용이었다. AI가 직업 구조를 재편하면, 이 결합이 느슨해진다. 직업이 정체성의 전부가 아닌 시대에, 개인은 재능, 관계, 가치관에 기반하여 정체성을 구성할 자유를 얻는다. 동시에, 그 정체성을 스스로 구성해야 하는 부담도 안게 된다.\n\n이 모든 변화를 관통하는 핵심은 하나다. 개인의 삶에서 외부 기관에 위임했던 판단의 범위가 축소되고 있다. 교육 기관이 독점했던 학습 경로, 의료 기관이 독점했던 건강 판단, 기업이 독점했던 경력 설계 — 이 모든 영역에서 개인의 자율적 판단 가능성이 확대되고 있다. 이것이 다음 장에서 논할 공동체 질서 재편의 출발점이다.\n\n\n---\n\n## 3장: 개인과 공동체의 관계 변화\n\n개인은 공동체의 출발점이자 가장 기본이 되는 단위다. 공동체는 가정 → 이웃 → 마을 → 도시 → 국가 → 글로벌 → 생태계로 구성된다. 공동체는 고정된 실체가 아니라 가치와 이익을 공유하는 관계의 체계다.\n\n공동체의 존재 이유는 개인이 혼자 감당할 수 없는 문제를 함께 해결하는 데 있다. 개인은 안전과 건강을 최우선으로 추구하는 존재다. 혼자서 그것을 확보할 수 없을 때, 개인은 공동체에 권한을 위임한다. 이 위임은 무한하지 않다. 공공 질서 유지라는 제한된 목적을 위한 것이며, 목적이 달성되면 권한도 돌아와야 한다.\n\n그러나 산업화 시대에 이 위임이 개인의 자유를 침해하는 수준으로 확장되었다. 왜 그랬는가? 산업 경제가 요구하는 규모와 표준화 때문이었다. 공장은 대규모 노동력의 조직적 투입을 필요로 했고, 국가는 그 노동력을 교육하고, 동원하고, 통제하는 역할을 맡았다. 징병제, 표준화된 교육 과정, 노동법, 사회보험 — 이 모든 제도는 산업 경제의 필요에 의해 설계되었다. 개인의 자율성보다 집단의 효율성이 우선시되는 구조였다.\n\nAI 시대에 이 구조의 전제가 무너진다. 대규모 조직적 투입이 아니라 소규모 고역량 단위가 생산의 중심이 되면, 국가가 노동력을 조직하고 통제해야 할 필요가 줄어든다. 교육도 마찬가지다. 표준화된 커리큘럼으로 동질적 노동력을 대량 생산해야 할 이유가 사라지면, 교육에 대한 개인의 자율적 선택 범위가 확대된다.\n\n위임 구조는 아래로 내려온다. 개인과 가정이 직접 처리하는 영역이 확대된다. AI가 법률 자문, 재무 설계, 건강 관리의 진입장벽을 낮추면, 이 영역들에서 전문 기관에 대한 의존이 줄어든다. 이웃과 마을 단위의 자치가 다시 의미를 갖게 된다. 도시가 새로운 실험 단위가 된다. 국가는 국방, 외교, 재난 대응처럼 개인과 도시가 혼자 감당할 수 없는 문제에 집중하고, 세계는 AI 거버넌스, 기후 위기처럼 국가가 혼자 풀 수 없는 문제만 다룬다.\n\n오픈소스 생태계는 이미 이 구조의 원형을 보여준다. 리눅스는 수천 명이 위계 없이 기여하지만, 기여의 질이 자연스럽게 권위를 만든다. 직책이 아니라 기여가 권위의 근거가 된다. 위키피디아도 마찬가지다. 중앙 편집 위원회가 아니라 참여자들의 반복적인 검증이 품질을 담보한다. 이것은 판단과 기여의 비대칭성이 해소된 환경에서 자연발생하는 질서의 형태다.\n\n동시에 간과해서는 안 되는 역설이 있다. AI가 효율적으로 대체할 수 없는 영역이 존재하며, 그 영역이 오히려 공동체의 본질적 가치를 드러낸다. 관계, 신뢰, 돌봄, 정서적 연대 — 이것들은 자동화되지 않는다. 노인 돌봄에서 AI가 활력 징후를 모니터링할 수 있지만, 손을 잡아주는 것은 사람만 할 수 있다. 아이의 교육에서 AI가 맞춤형 학습 자료를 제공할 수 있지만, 좌절한 아이를 격려하는 것은 사람의 몫이다. AI가 효율의 영역을 가져갈수록, 인간 고유의 관계적 역할이 오히려 명확해진다.\n\n개인과 공동체의 관계가 재편된다는 것은, 공동체가 사라진다는 뜻이 아니다. 공동체에 대한 권한 위임의 범위와 방식이 바뀐다는 뜻이다. 의존 기반의 위임에서 선택 기반의 위임으로, 포괄적 위임에서 영역별 위임으로 전환된다. 이 전환은 경제 질서의 변화와 분리할 수 없다. 개인이 생계를 위해 조직에 종속될 필요가 줄어들 때, 공동체에 대한 위임의 성격도 달라지기 때문이다. 경제 질서의 질문에 먼저 답해야 한다.\n\n\n---\n\n## 4장: 경제 질서의 전환 — 시장은 자연이 아니다\n\n여기서 한 걸음 물러서야 한다. 현재의 경제 질서 — 시장 가격에 의해 자원이 배분되고, 노동이 상품으로 거래되고, 개인의 가치가 시장에서의 교환가치로 환원되는 체계 — 를 우리는 자연스러운 것으로 받아들이는 데 익숙하다. 그러나 이것은 역사적으로 구성된 질서이지, 인류의 본성에서 자연발생한 것이 아니다.\n\n카를 폴라니(Karl Polanyi)는 1944년 《거대한 전환》에서 이 점을 명쾌하게 논증했다. 폴라니의 핵심 주장은 세 가지다.\n\n첫째, 자기조절 시장(self-regulating market)은 역사적 예외다. 인류 역사의 대부분에서 경제 활동은 사회적 관계에 '배태(embedded)'되어 있었다. 호혜, 재분배, 가계 경영이 경제의 기본 원리였다. 시장이 사회로부터 분리되어 독립적인 논리로 작동하기 시작한 것은 19세기 영국에서의 매우 특수한 역사적 사건이다. 그것은 인간 본성의 발현이 아니라 국가의 적극적인 입법과 강제에 의해 인위적으로 만들어진 것이었다.\n\n둘째, 시장이 사회로부터 분리될 때 필연적으로 파괴가 발생한다. 토지, 노동, 화폐 — 폴라니가 '허구적 상품(fictitio
